openapi: 3.0.3

info:
  title: DC-API
  version: 0.1.0
  description: |
    WSO2 Sovereign Cloud Control Plane API.

    DC-API sits in front of a Rancher + Harvester infrastructure layer and
    exposes a clean, tenant-isolated REST API for managing VMs, RKE2 clusters,
    virtual networks, DNS zones, and RBAC — in the style of AWS / Azure.

    **Authentication**

    Every `/v1/*` endpoint requires a `Bearer` token in the `Authorization`
    header. Two token types are accepted by the same scheme:

    1. **Asgardeo OIDC JWT** — obtained via the `dcctl login` PKCE flow. The JWT
       must carry a `groups` claim containing at least one group matching the
       tenant group prefix (default `dc-tenant-<tenant-id>`).

    2. **Service-account token** — a long-lived opaque token with the format
       `dcapi_sa_<lookup_id>_<secret>`, issued by
       `POST /v1/tenants/{tenant_id}/service-accounts`. Store it on creation;
       it cannot be retrieved again.

    **Async provisioning**

    Long-running operations (VM create, VNet create, etc.) return `202 Accepted`
    immediately. The response body contains the resource object with
    `"status": "PENDING"` and a `note` field with the polling URL. Poll the
    GET endpoint until `status` transitions to `ACTIVE` or `FAILED`.

    **Status lifecycle**

    `PENDING → ACTIVE` or `PENDING → FAILED`

    Deletion: `ACTIVE → DELETING → (row removed on success)`

    **Error format**

    All non-2xx responses use the flat envelope `{"error": "human-readable message"}`.

servers:
  - url: https://dcapi.lk.internal.wso2.com
    description: LK dev cluster (VPN required)
  - url: http://localhost:8080
    description: Local development

tags:
  - name: health
    description: Unauthenticated liveness probe
  - name: images
    description: VM bootable images
  - name: networks
    description: Legacy Harvester NAD network listing (pre-M2)
  - name: vms
    description: Virtual machines (async provisioning via Harvester/KubeVirt)
  - name: bastions
    description: |
      Per-VPC bastion hosts for SSH access to VMs in private VPC subnets (F10).
      A bastion is a small VM with two NICs — one on the tenant subnet (to
      reach internal VMs) and one on an operator-reachable VLAN (so tenants
      can SSH in from their workstations).
  - name: clusters
    description: RKE2 Kubernetes clusters (async provisioning via Rancher)
  - name: members
    description: Tenant membership management (human users)
  - name: service-accounts
    description: Service account lifecycle and token management
  - name: networking-vnets
    description: Virtual networks and subnets (M2 KubeOVN)
  - name: networking-peerings
    description: VNet-to-VNet peerings (M2 KubeOVN)
  - name: networking-nsgs
    description: Network security groups and attachment rules (M2 KubeOVN)
  - name: networking-route-tables
    description: Route tables and subnet associations (M2 KubeOVN)
  - name: networking-private-dns
    description: Private DNS zones and records (M2 KubeOVN / CoreDNS)
  - name: projects
    description: |
      Project management. Projects sit beneath Tenants as the primary workspace
      boundary. Every compute and network resource belongs to a project. A tenant
      owner is implicitly an owner of all projects in that tenant.
  - name: tenants
    description: Tenant discovery for the authenticated principal
  - name: quotas
    description: Tenant resource quotas (read-only in v1)
  - name: keyvaults
    description: |
      Azure-style Key Vault resources. Chunk 1 covers the logical record
      (CRUD on `/keyvaults`). Chunk 2 adds Per-VPC Private Endpoints.
      Chunk 3 adds the human-driven secret CRUD data plane
      (`/keyvaults/{id}/secrets`), proxied through dc-api to the per-tenant
      OpenBao KV-v2 mount — callers never see OpenBao tokens.
  - name: databases
    description: |
      Managed PostgreSQL databases (DBaaS). Each Database is a project-scoped
      KubeVirt VM provisioned by the dbaas controller. Task 1 v1: Postgres
      only, 1:1 model (one Database = one VM), shown-once credentials via
      `GET .../credentials`. Network can be on a KubeOVN VPC subnet or a
      legacy Multus bridge NAD — selectable per-instance.
  - name: auth
    description: |
      Backend-for-Frontend OIDC session endpoints used by cloud-ui. Not consumed by dcctl.

      cloud-ui is a public SPA that cannot safely hold a `client_secret`, and Asgardeo
      strips the `groups` claim from tokens issued to public clients. The BFF runs an
      OAuth2 authorization-code-with-PKCE flow server-side against a confidential Asgardeo
      application (which receives the full claims set), then issues an HttpOnly encrypted
      session cookie that cloud-ui sends on every subsequent request.

      The existing JWT middleware in dc-api accepts the `dcapi_session` cookie as an
      alternative to a `Bearer` header — cloud-ui's runtime calls to `/v1/*` go through
      the same auth code path as `dcctl`.

security:
  - bearerAuth: []

paths:

  # ── Health ─────────────────────────────────────────────────────────────────

  /healthz:
    get:
      operationId: getHealth
      tags: [health]
      summary: Liveness probe
      description: |
        Unauthenticated Kubernetes liveness/readiness probe. Returns HTTP 200
        with `{"status":"ok"}` when the process is up. No auth required.
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ── Projects ────────────────────────────────────────────────────────────────

  /v1/tenants/{tenant_id}/cap-usage:
    parameters:
      - $ref: "#/components/parameters/TenantID"
    get:
      operationId: getTenantCapUsage
      tags: [tenants]
      summary: Read tenant capacity cap, current allocation, and remaining headroom
      description: |
        Returns three triplets (`cap`, `allocated`, `available`) so callers can
        show "you have X cpu / Y GB ram / Z GB storage available" inline before
        submitting a project create or PATCH. Any tenant member can read;
        mutation is admin-only via `PATCH /v1/admin/tenants/{tenant_id}`.

        `available = cap - allocated`. May be 0 (tenant fully distributed)
        but never negative — the cap-shrink-guard refuses any update that
        would push allocated above cap.
      responses:
        "200":
          description: Tenant capacity usage triplet
          content:
            application/json:
              schema:
                type: object
                required: [cap, allocated, available]
                properties:
                  cap:
                    $ref: "#/components/schemas/TenantCap"
                  allocated:
                    $ref: "#/components/schemas/TenantCap"
                  available:
                    $ref: "#/components/schemas/TenantCap"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects:
    parameters:
      - $ref: "#/components/parameters/TenantID"

    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects in a tenant
      description: |
        Returns all projects visible to the authenticated principal. Any tenant
        member (viewer or above) may call this endpoint.
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      description: |
        Creates a new project in the tenant. Tenant-owner role required.
        Allocates compute/storage quotas and provisions the backing Kubernetes
        namespace (best-effort, retried on first resource create).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"

    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project
      description: |
        Returns the project with its quota details. Any principal with at least
        Viewer access to the project or the parent tenant may call this.
      responses:
        "200":
          description: Project object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      operationId: updateProjectQuota
      tags: [projects]
      summary: Update a project's capacity quotas
      description: |
        Updates one or more of `cpu_cores`, `memory_gb`, `storage_gb` on the
        project. Tenant-owner or platform-admin only.

        Two cap invariants are enforced inside a single transaction:

        - **In-use guard:** new quota must be ≥ the sum of resources currently
          consuming the budget (active VMs, clusters, bastions). Refused with
          `400 quota_below_usage` if the new value would shrink below in-use.
        - **Tenant-cap guard:** new quota + sum of other projects' allocations
          must be ≤ the tenant cap. Refused with `400 quota_exceeded` (body is
          a `QuotaExceededError`).

        On success the project's namespace `ResourceQuota` object is updated
        asynchronously to mirror the new capacities (best-effort).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectQuotaRequest"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid request, quota_below_usage, or quota_exceeded
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/QuotaExceededError"
                  - type: object
                    required: [error, message, requested, in_use]
                    properties:
                      error:
                        type: string
                        enum: [quota_below_usage]
                      message:
                        type: string
                      requested:
                        $ref: "#/components/schemas/TenantCap"
                      in_use:
                        $ref: "#/components/schemas/TenantCap"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      description: |
        Deletes a project. The project must have no active resources (VMs, VNets,
        clusters, etc.) otherwise `409 Conflict` is returned. Tenant-owner only.
      responses:
        "204":
          description: Project deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Images ─────────────────────────────────────────────────────────────────

  /v1/tenants/{tenant_id}/images:
    parameters:
      - $ref: "#/components/parameters/TenantID"

    get:
      operationId: listImages
      tags: [images]
      summary: List available VM images
      description: |
        Returns all VirtualMachineImage CRDs visible to DC-API in Harvester.
        Use the `id` field (format `namespace/resource-name`) as the value for
        `image_name` when creating a VM.
      responses:
        "200":
          description: List of images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Image"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createImage
      tags: [images]
      summary: Register a new VM image by download URL
      description: |
        Triggers Harvester to download and register a new VirtualMachineImage
        CRD from the given URL. Returns `202 Accepted` with the Image object;
        the image may take several minutes to download.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateImageRequest"
      responses:
        "202":
          description: Image registration accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Image"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Legacy Networks ──────────────────────────────────────────────────────────

  /v1/tenants/{tenant_id}/networks:
    parameters:
      - $ref: "#/components/parameters/TenantID"

    get:
      operationId: listNetworks
      tags: [networks]
      summary: List available Harvester NAD networks (legacy)
      description: |
        Returns NetworkAttachmentDefinition CRDs from Harvester. Used as the
        `network_name` value when creating VMs on the legacy bridge path.
        This endpoint pre-dates M2 VNets and remains for backward compatibility.
        For new VMs prefer `vnet_id` + `subnet_id` instead of `network_name`.
      responses:
        "200":
          description: List of networks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Network"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Virtual Machines ─────────────────────────────────────────────────────────

  /v1/tenants/{tenant_id}/projects/{project_id}/virtual-machines:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"

    post:
      operationId: createVirtualMachine
      tags: [vms]
      summary: Create a virtual machine (async)
      description: |
        Accepts the VM specification, creates a PENDING record in DC-API's
        PostgreSQL state store, then triggers async provisioning in Harvester.
        Returns `202 Accepted` immediately.

        **Credentials** — DC-API generates an ECDSA P-256 SSH key pair and a
        random console password. Both are returned **once** in this response
        and never stored server-side. Save the `private_key` immediately.

        **Network attachment** — exactly one of the following must be provided:
        - Legacy bridge path: set `network_name` only.
        - VPC path (M2): set `vnet_id` + `subnet_id` only. Both VNets must be
          ACTIVE and belong to the caller's tenant.

        **Polling** — poll `GET /v1/virtual-machines/{id}` until
        `status` is `ACTIVE` or `FAILED`.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVirtualMachineRequest"
            examples:
              legacy-network:
                summary: Legacy bridge path
                value:
                  name: web-01
                  size: medium
                  image_name: default/image-rflb5
                  network_name: default/vm-net-100
              vpc-path:
                summary: M2 VPC path
                value:
                  name: api-01
                  size: large
                  disk_gb: 100
                  image_name: default/image-rflb5
                  vnet_id: 3a1c2e5d-0000-0000-0000-000000000001
                  subnet_id: 3a1c2e5d-0000-0000-0000-000000000002
      responses:
        "202":
          description: |
            VM creation accepted. The resource is in PENDING state.
            Poll `GET /v1/virtual-machines/{id}` for status updates.
          headers:
            Location:
              description: URL to poll for status
              schema:
                type: string
                example: /v1/virtual-machines/3a1c2e5d-1234-5678-abcd-000000000001
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVirtualMachineResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/QuotaExceeded"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: listVirtualMachines
      tags: [vms]
      summary: List virtual machines for the authenticated tenant
      description: |
        Returns all VM resource records belonging to the caller's tenant.
        No pagination — returns the full set. Tenant isolation is enforced
        server-side; callers cannot see VMs from other tenants.
      responses:
        "200":
          description: List of VMs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VirtualMachine"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/virtual-machines/{id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/ResourceID"

    get:
      operationId: getVirtualMachine
      tags: [vms]
      summary: Get a virtual machine by UUID
      description: |
        Returns the current state of a VM. Poll this endpoint after
        `POST /v1/virtual-machines` to track provisioning progress.
        Returns 404 for both "not found" and "belongs to another tenant"
        to prevent cross-tenant enumeration.
      responses:
        "200":
          description: VM resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualMachine"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteVirtualMachine
      tags: [vms]
      summary: Delete a virtual machine (async)
      description: |
        Marks the VM as DELETING and triggers async removal from Harvester.
        Returns `202 Accepted` immediately. The DB row is removed by the
        reconciler once Harvester returns 404 for the resource.

        **Required role**: `owner`.
      responses:
        "202":
          description: Deletion accepted; VM is now DELETING
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Bastions (F10) ────────────────────────────────────────────────────────────

  /v1/tenants/{tenant_id}/projects/{project_id}/bastions:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"

    post:
      operationId: createBastion
      tags: [bastions]
      summary: Create a bastion host (async)
      description: |
        Creates a small VM with two NICs — one on the target VPC's subnet
        (for ProxyJump-ing to internal VMs) and one on an operator-reachable
        VLAN (so tenants can SSH in from their workstations). Returns `202`
        immediately; provisioning completes in 2-5 minutes.

        **Credentials** — DC-API generates an ECDSA P-256 SSH key pair, returns
        the `private_key` **once**, and never stores it server-side.

        **Polling** — poll `GET /v1/bastions/{id}` until `status` is `ACTIVE`
        (then `mgmt_ip` is populated and the bastion is reachable).

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBastionRequest"
            example:
              name: prod-bastion
              vnet_id: 3a1c2e5d-0000-0000-0000-000000000010
              subnet_id: 3a1c2e5d-0000-0000-0000-000000000021
              description: Bastion for prod-vnet
      responses:
        "202":
          description: |
            Bastion creation accepted. Resource is in PENDING state.
            Poll `GET /v1/bastions/{id}` until `mgmt_ip` is populated.
          headers:
            Location:
              description: URL to poll for status
              schema:
                type: string
                example: /v1/bastions/3a1c2e5d-1234-5678-abcd-000000000005
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBastionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/QuotaExceeded"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: listBastions
      tags: [bastions]
      summary: List bastion hosts for the authenticated tenant
      description: |
        Returns all bastions belonging to the caller's tenant. No pagination.
        Tenant isolation is enforced server-side.
      responses:
        "200":
          description: List of bastions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bastion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/bastions/{id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/ResourceID"

    get:
      operationId: getBastion
      tags: [bastions]
      summary: Get a bastion by UUID
      description: |
        Returns the current state of a bastion. Poll this endpoint after
        `POST /v1/bastions` to track provisioning. Returns 404 for both
        "not found" and "belongs to another tenant".
      responses:
        "200":
          description: Bastion resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bastion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteBastion
      tags: [bastions]
      summary: Delete a bastion (async)
      description: |
        Marks the bastion as DELETING and triggers async removal from
        Harvester. Returns `202`. The DB row is removed by the reconciler
        once the backend VM is gone.

        **Required role**: `owner` (only resource owner can delete).
      responses:
        "202":
          description: Bastion deletion accepted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Clusters ──────────────────────────────────────────────────────────────────

  /v1/tenants/{tenant_id}/projects/{project_id}/clusters:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"

    post:
      operationId: createCluster
      tags: [clusters]
      summary: Create an RKE2 cluster (async)
      description: |
        Accepts the cluster specification, creates a PENDING record, and
        triggers async provisioning in Rancher. Returns `202 Accepted`.

        The request body includes a `system_pool` object that configures the
        system node pool (controlplane + etcd). Worker node pools are added
        separately via `POST /clusters/{id}/node-pools` after the cluster
        reaches `ACTIVE` status.

        **Polling** — poll `GET .../clusters/{id}` until `status` is
        `ACTIVE` or `FAILED`. Cluster creation typically takes 8–15 minutes.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClusterRequest"
            examples:
              vpc_path:
                summary: VPC path — 3-node HA system pool
                value:
                  name: prod-k8s-01
                  k8s_version: v1.33.10+rke2r3
                  image_name: default/image-rflb5
                  vnet_id: 3a1c2e5d-1234-5678-abcd-000000000001
                  subnet_id: 3a1c2e5d-1234-5678-abcd-000000000002
                  system_pool:
                    size: large
                    count: 3
              single_node:
                summary: VPC path — single-node dev cluster
                value:
                  name: dev-k8s-01
                  k8s_version: v1.33.10+rke2r3
                  image_name: default/image-rflb5
                  vnet_id: 3a1c2e5d-1234-5678-abcd-000000000001
                  subnet_id: 3a1c2e5d-1234-5678-abcd-000000000002
                  system_pool:
                    size: medium
                    count: 1
              legacy_path:
                summary: Legacy bridge path
                value:
                  name: legacy-k8s-01
                  k8s_version: v1.33.10+rke2r3
                  image_name: default/image-rflb5
                  network_name: default/vm-net-100
                  system_pool:
                    size: medium
                    count: 1
      responses:
        "202":
          description: |
            Cluster creation accepted. The resource is in PENDING state.
            Poll `GET .../clusters/{id}` for status updates.
          headers:
            Location:
              description: URL to poll for status
              schema:
                type: string
                example: /v1/tenants/acme/projects/platform/clusters/3a1c2e5d-1234-5678-abcd-000000000002
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClusterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/QuotaExceeded"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: listClusters
      tags: [clusters]
      summary: List RKE2 clusters for the authenticated tenant/project
      responses:
        "200":
          description: List of clusters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cluster"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/clusters/{id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/ResourceID"

    get:
      operationId: getCluster
      tags: [clusters]
      summary: Get a cluster by UUID
      description: |
        Returns the current state of a cluster. Poll after `POST .../clusters`
        to track provisioning progress. The response embeds the `system_pool`
        object and a `worker_pool_count` integer. For the full node-pool list,
        call `GET .../clusters/{id}/node-pools`.
      responses:
        "200":
          description: Cluster resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cluster"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteCluster
      tags: [clusters]
      summary: Delete a cluster (async)
      description: |
        Marks the cluster as DELETING and triggers async removal via Rancher.
        All node pools (system and worker) are drained and removed as part of
        the cluster deletion cascade. Returns `202 Accepted` immediately.

        **Required role**: `owner`.
      responses:
        "202":
          description: Deletion accepted; cluster is now DELETING
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/clusters/{id}/kubeconfig:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/ResourceID"

    get:
      operationId: getClusterKubeconfig
      tags: [clusters]
      summary: Download kubeconfig YAML for an active cluster
      description: |
        Returns the kubeconfig YAML as plain text. The cluster must be
        in `ACTIVE` status; returns 409 otherwise. Pipe the response
        directly to a file:

        ```
        dcctl kubeconfig <id> > ~/.kube/prod.yaml
        ```
      responses:
        "200":
          description: kubeconfig YAML
          content:
            text/plain:
              schema:
                type: string
                example: |
                  apiVersion: v1
                  kind: Config
                  clusters: []
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cluster is not yet ACTIVE
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "cluster is not yet active (status: PENDING)"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Node Pools ─────────────────────────────────────────────────────────────────

  /v1/tenants/{tenant_id}/projects/{project_id}/clusters/{id}/node-pools:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/ResourceID"

    get:
      operationId: listNodePools
      tags: [clusters]
      summary: List all node pools for a cluster
      description: |
        Returns all node pools — system pool first, then worker pools in
        creation order. Use the `role` field (`system` or `worker`) to
        distinguish pool categories.

        **Required role**: `member` or `owner`.
      responses:
        "200":
          description: List of node pools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NodePool"
              example:
                - name: system
                  role: system
                  size: large
                  count: 3
                  status: ready
                  created_at: "2026-05-23T10:00:00Z"
                - name: workers-01
                  role: worker
                  size: xlarge
                  count: 5
                  taints:
                    - key: workload
                      value: gpu
                      effect: NoSchedule
                  labels:
                    team: ml
                  status: ready
                  created_at: "2026-05-23T11:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createNodePool
      tags: [clusters]
      summary: Add a worker node pool to an existing cluster (async)
      description: |
        Adds a new worker node pool to a cluster that is in `ACTIVE` status.
        The pool role is always `worker` — system pools cannot be created via
        this endpoint (there is exactly one system pool, created with the cluster).

        Returns `202 Accepted`. The pool's `status` transitions
        `provisioning → ready` as Rancher brings up the nodes.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNodePoolRequest"
            examples:
              basic:
                summary: Basic worker pool
                value:
                  name: workers-01
                  size: xlarge
                  count: 3
              with_taints_labels:
                summary: Worker pool with taints and labels
                value:
                  name: gpu-workers
                  size: xlarge
                  count: 2
                  taints:
                    - key: nvidia.com/gpu
                      effect: NoSchedule
                  labels:
                    accelerator: nvidia-tesla-a100
      responses:
        "202":
          description: |
            Worker pool creation accepted. Poll `GET .../node-pools/{name}`
            until `status` is `ready`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodePool"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Conflict — either the cluster is not in `ACTIVE` status, or a pool
            with the requested `name` already exists in this cluster.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                cluster_not_active:
                  value:
                    error: "cluster is not ACTIVE (status: PENDING)"
                name_conflict:
                  value:
                    error: "a node pool named 'workers-01' already exists in this cluster"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/clusters/{id}/node-pools/{pool_name}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/ResourceID"
      - name: pool_name
        in: path
        required: true
        schema:
          type: string
          pattern: '^[a-z]([-a-z0-9]{0,38}[a-z0-9])?$'
        description: Name of the node pool (e.g. `system`, `workers-01`)
        example: workers-01

    get:
      operationId: getNodePool
      tags: [clusters]
      summary: Get a single node pool by name
      description: |
        **Required role**: `member` or `owner`.
      responses:
        "200":
          description: Node pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodePool"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateNodePool
      tags: [clusters]
      summary: Scale or reconfigure a node pool
      description: |
        Mutates the mutable attributes of a node pool. All fields are optional;
        omit a field to leave it unchanged.

        **Mutable fields**:
        - `count` — scale the pool up or down. For the `system` pool, only
          growth in steps `{1→3, 3→5}` is allowed; shrinks are refused with
          `400`. Worker pools accept any count between 1 and 50.
        - `taints` — replaces the entire taint array. Send `[]` to clear all
          taints. Refused on the `system` pool with `400`.
        - `labels` — replaces the entire label map. Send `{}` to clear all
          labels. Refused on the `system` pool with `400`.

        **Immutable fields** (not present in this schema; return `400` if sent
        via unknown field handling): `name`, `role`, `size`.

        Returns `202 Accepted` with the pool's current state (status will
        reflect `scaling` for count changes until Rancher has reconciled
        the new node count). The Rancher machinePool update is asynchronous.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchNodePoolRequest"
            examples:
              scale_up:
                summary: Scale worker pool to 5 nodes
                value:
                  count: 5
              replace_taints:
                summary: Replace taint list
                value:
                  taints:
                    - key: workload
                      value: batch
                      effect: NoSchedule
              clear_labels:
                summary: Clear all labels
                value:
                  labels: {}
      responses:
        "202":
          description: |
            Update accepted. The pool's status reflects the transitional state:
            `scaling` when count changed, unchanged status for taint/label-only
            updates. Poll `GET .../node-pools/{pool_name}` for completion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodePool"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cluster is not in ACTIVE status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "cluster is not ACTIVE (status: PENDING)"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteNodePool
      tags: [clusters]
      summary: Delete a worker node pool (async)
      description: |
        Drains all nodes in the pool (via Rancher's `drainBeforeDelete=true`)
        and removes the pool from the cluster. Returns `202 Accepted`; drain
        is asynchronous.

        The `system` pool cannot be deleted via this endpoint — delete the
        entire cluster instead. Returns `400` if `pool_name` is `system`.

        **Required role**: `member` or `owner`.
      responses:
        "202":
          description: Deletion accepted; pool is being drained and removed
        "400":
          description: |
            Bad request — either `pool_name` is `system` (delete the cluster
            instead) or the cluster is not in a state that allows pool deletion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                system_pool:
                  value:
                    error: "the system pool cannot be deleted; delete the cluster to remove it"
                cluster_not_active:
                  value:
                    error: "cluster is not ACTIVE (status: DELETING)"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Tenant Members ─────────────────────────────────────────────────────────

  /v1/tenants/{tenant_id}/members:
    parameters:
      - $ref: "#/components/parameters/TenantID"

    post:
      operationId: inviteMember
      tags: [members]
      summary: Invite a user to the tenant
      description: |
        Creates a `role_assignments` row binding the user (identified by
        their OIDC `sub`) to the tenant scope. Returns 409 if the user
        already holds that role. Also UPSERTs a `tenants` registry row
        for the tenant as a side effect, so the tenant is discoverable
        by admins via `GET /v1/tenants` without a separate registration.

        The URL `{tenant_id}` must match the caller's own tenant context
        (Option D: derived from a `role_assignments` row, not from any
        IdP group). Platform admins may operate on any tenant.

        **Required role**: `owner` (or platform admin).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberRequest"
            example:
              user_sub: 01abc123-0000-0000-0000-user000000001
              role: member
              display_alias: alice-laptop
      responses:
        "201":
          description: Member invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleAssignment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: listMembers
      tags: [members]
      summary: List human members of the tenant
      description: |
        Returns all `role_assignments` rows of `principal_type: user` for
        the tenant scope. Service accounts are excluded; use
        `GET /v1/tenants/{tenant_id}/service-accounts` for those.

        **Required role**: any authenticated tenant member (viewer, member, or owner).
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/RoleAssignment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/members/{principal_id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - name: principal_id
        in: path
        required: true
        description: OIDC subject (`sub`) of the user to remove
        schema:
          type: string
          example: 01abc123-0000-0000-0000-user000000001

    delete:
      operationId: removeMember
      tags: [members]
      summary: Remove a user from the tenant
      description: |
        Atomically deletes all `role_assignments` rows for this principal at
        the tenant scope. Returns 409 if the target is the last owner.

        **Required role**: `owner`.
      responses:
        "204":
          description: Member removed
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cannot remove the last owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "cannot remove the last owner of a tenant; promote another member to owner first"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Service Accounts ─────────────────────────────────────────────────────────

  /v1/tenants/{tenant_id}/projects/{project_id}/service-accounts:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"

    post:
      operationId: createServiceAccount
      tags: [service-accounts]
      summary: Create a service account
      description: |
        Creates a service account and returns its raw token **exactly once**.
        The token format is `dcapi_sa_<lookup_id>_<secret>`. Store it
        immediately; subsequent GET/LIST responses never include the token.

        The service account is created with a `role_assignments` row granting
        the requested role at the tenant scope.

        Returns 409 if a service account with the same name already exists
        in this tenant.

        **Required role**: `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceAccountRequest"
            example:
              name: ci-deploy
              role: member
              description: GitHub Actions deploy pipeline
      responses:
        "201":
          description: |
            Service account created. The `token` field contains the raw
            `dcapi_sa_*` token — shown only once.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateServiceAccountResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: listServiceAccounts
      tags: [service-accounts]
      summary: List service accounts for the tenant
      description: |
        Returns all service accounts. The `token` field is never included.

        **Required role**: any authenticated tenant member.
      responses:
        "200":
          description: Service account list
          content:
            application/json:
              schema:
                type: object
                properties:
                  service_accounts:
                    type: array
                    items:
                      $ref: "#/components/schemas/ServiceAccount"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/service-accounts/{sa_id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - name: sa_id
        in: path
        required: true
        description: UUID of the service account
        schema:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000099

    get:
      operationId: getServiceAccount
      tags: [service-accounts]
      summary: Get a service account by UUID
      description: |
        Returns a single service account. The `token` field is never included.

        **Required role**: any authenticated tenant member.
      responses:
        "200":
          description: Service account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceAccount"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteServiceAccount
      tags: [service-accounts]
      summary: Delete a service account
      description: |
        Deletes the service account and all its `role_assignments` rows in a
        single transaction. Any bearer token issued to this SA immediately
        becomes invalid.

        **Required role**: `owner`.
      responses:
        "204":
          description: Service account deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Tenants (new) ─────────────────────────────────────────────────────────────

  /v1/tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      summary: List tenants the authenticated principal has access to
      description: |
        Returns the set of tenants for which the authenticated principal holds
        at least one `role_assignments` row (at any scope within the tenant).

        The `roles` array is the **union of distinct roles** the principal holds
        across all scopes within that tenant — useful for the UI tenant switcher
        to decide which actions to enable.

        Both human users (OIDC JWT) and service accounts (dcapi_sa_* token)
        may call this endpoint. The result is always scoped to the caller's
        own principal.

        **Platform admins** (sub in `DCAPI_PLATFORM_ADMIN_SUBS`, OR member of
        `DCAPI_ADMIN_GROUP`): this endpoint returns **every tenant** in the
        `tenants` registry — not just the caller's role-assignment rows.
        Each entry's `roles` is set to `["owner"]` for UI convenience;
        admins bypass per-tenant RBAC checks at the middleware layer
        regardless. Tenants without role-assignment rows are still
        visible to admins as long as they're in the registry — the
        registry is populated by `POST /v1/admin/tenants` (explicit
        admin pre-registration) or by `POST /v1/tenants/{tid}/members`
        (UPSERT on first invite).

        **Required auth**: any valid token. No minimum role required beyond
        being authenticated.
      responses:
        "200":
          description: List of tenants the principal has access to
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TenantSummary"
              example:
                - id: iam-platform
                  name: iam-platform
                  roles:
                    - owner
                - id: dev-team
                  name: dev-team
                  roles:
                    - member
                    - viewer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Admin: tenant registry ────────────────────────────────────────────────────

  /v1/admin/tenants:
    post:
      operationId: adminCreateTenant
      tags: [tenants, admin]
      summary: Register a tenant in the local registry (platform-admin only)
      description: |
        Inserts a row into the `tenants` registry so the tenant is
        visible via `GET /v1/tenants` (admin path).

        Two paths populate the registry; this endpoint is the explicit
        one. The other is implicit: `POST /v1/tenants/{tid}/members`
        UPSERTs the registry row as a side effect of the first invite.
        Use this endpoint when an admin wants the tenant discoverable
        before inviting anyone.

        Does **not** create any Asgardeo group — Option D treats the
        IdP as authentication-only. Membership lives in dc-api
        (`role_assignments`).

        **Required auth**: platform admin (sub in
        `DCAPI_PLATFORM_ADMIN_SUBS` OR member of `DCAPI_ADMIN_GROUP`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
            example:
              id: cs-team
              name: Customer Success
              description: SRE-managed support tenant
      responses:
        "201":
          description: Tenant registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          description: |
            Validation error — `id` empty, malformed, or longer than the
            allowed length.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller is authenticated but not a platform admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: A tenant with this `id` already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/admin/tenants/{tenant_id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
    patch:
      operationId: adminUpdateTenantCap
      tags: [tenants, admin]
      summary: Update a tenant's capacity ceiling (platform-admin only)
      description: |
        Adjusts one or more of `cpu_cores_cap`, `memory_gb_cap`,
        `storage_gb_cap` on the tenant. Tenant owners distribute these
        caps across projects via per-project quotas; this endpoint is the
        only way to change the ceiling.

        Shrink-guard: the new cap on any dimension must be ≥ the current
        sum of project allocations in that dimension. If shrinking would
        leave projects allocated above the cap, the call is refused with
        `400 quota_exceeded` (body is a `QuotaExceededError`). To shrink
        below the existing distribution, shrink or delete projects first.

        **Required auth**: platform admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantCapRequest"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          description: Invalid body or shrink-guard tripped (quota_exceeded)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/QuotaExceededError"
                  - $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── VNets ─────────────────────────────────────────────────────────────────────

  /v1/tenants/{tenant_id}/projects/{project_id}/vnets:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"

    post:
      operationId: createVNet
      tags: [networking-vnets]
      summary: Create a virtual network (async)
      description: |
        Creates a KubeOVN Vpc CRD. Returns `202 Accepted`; poll
        `GET /v1/vnets/{vnet_id}` until `ACTIVE`.

        `address_space` must be one or more RFC1918 CIDRs (max 5 in M2)
        that do not overlap with the region's reserved infrastructure ranges.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVNetRequest"
            example:
              name: prod-vnet
              address_space:
                - 10.10.0.0/16
              region: lk-dev
              description: Production VNet
      responses:
        "202":
          description: |
            VNet creation accepted. Poll GET /v1/vnets/{vnet_id} for status.
          headers:
            Location:
              schema:
                type: string
                example: /v1/vnets/3a1c2e5d-0000-0000-0000-000000000010
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsyncNetworkResponse"
              example:
                resource:
                  id: 3a1c2e5d-0000-0000-0000-000000000010
                  tenant_id: iam-platform
                  name: prod-vnet
                  region: lk-dev
                  address_space: ["10.10.0.0/16"]
                  status: PENDING
                  provider_type: kubeovn
                  created_at: "2026-05-09T10:00:00Z"
                  updated_at: "2026-05-09T10:00:00Z"
                note: "VNet is being provisioned. Poll GET /v1/vnets/3a1c2e5d-0000-0000-0000-000000000010 for status."
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/QuotaExceeded"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: listVNets
      tags: [networking-vnets]
      summary: List virtual networks for the authenticated tenant
      responses:
        "200":
          description: List of VNets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VNet"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/vnets/{vnet_id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/VNetID"

    get:
      operationId: getVNet
      tags: [networking-vnets]
      summary: Get a VNet by UUID
      responses:
        "200":
          description: VNet resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VNet"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteVNet
      tags: [networking-vnets]
      summary: Delete a VNet (async)
      description: |
        Marks the VNet as DELETING and triggers async removal from KubeOVN.
        Returns 409 if the VNet has non-FAILED subnets, route tables, or
        peerings — delete those first.

        **Required role**: `owner`.
      responses:
        "202":
          description: Deletion accepted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: VNet has active dependents (subnets, route tables, or peerings)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "VNet has active subnets; delete them first: 3a1c..."
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Subnets ───────────────────────────────────────────────────────────────────

  /v1/tenants/{tenant_id}/projects/{project_id}/vnets/{vnet_id}/subnets:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/VNetID"

    post:
      operationId: createSubnet
      tags: [networking-vnets]
      summary: Create a subnet within a VNet (async)
      description: |
        Creates a KubeOVN Subnet CRD inside the parent VNet. Returns `202 Accepted`.

        The CIDR must:
        - Be a valid RFC1918 block (`/8`–`/28`)
        - Be contained within at least one of the parent VNet's `address_space` entries
        - Not overlap any sibling subnet in the same VNet
        - Not overlap the region's reserved infrastructure ranges

        Gateway defaults to the first usable IP in the CIDR if omitted.

        The parent VNet must be in `ACTIVE` status.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubnetRequest"
            example:
              name: app-subnet
              cidr: 10.10.1.0/24
              gateway: 10.10.1.1
              description: Application tier
      responses:
        "202":
          description: |
            Subnet creation accepted. Poll GET /v1/vnets/{vnet_id}/subnets/{subnet_id}.
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsyncNetworkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/QuotaExceeded"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: listSubnets
      tags: [networking-vnets]
      summary: List subnets within a VNet
      responses:
        "200":
          description: List of subnets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subnet"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/vnets/{vnet_id}/subnets/{subnet_id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/VNetID"
      - name: subnet_id
        in: path
        required: true
        description: UUID of the subnet
        schema:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000021

    get:
      operationId: getSubnet
      tags: [networking-vnets]
      summary: Get a subnet by UUID
      responses:
        "200":
          description: Subnet resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subnet"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteSubnet
      tags: [networking-vnets]
      summary: Delete a subnet (async)
      description: |
        Marks the subnet DELETING and triggers async KubeOVN removal.

        Returns 409 if any VMs, bastions, or clusters are still attached to
        the subnet (via `subnet_id` on the resource row). KubeOVN refuses to
        release the logical switch while LSPs are pinned, so attempting the
        delete asynchronously would leave the subnet stuck in FAILED. Delete
        the attached resources first, then retry.

        **Required role**: `owner`.
      responses:
        "202":
          description: Deletion accepted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Subnet has attached resources (VMs, bastions, or clusters)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "subnet has attached resources; delete them first: chalitha-bastion (bastion), web-01 (vm)"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Route Tables ───────────────────────────────────────────────────────────────

  /v1/tenants/{tenant_id}/projects/{project_id}/vnets/{vnet_id}/route-tables:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/VNetID"

    post:
      operationId: createRouteTable
      tags: [networking-route-tables]
      summary: Create a route table within a VNet (synchronous)
      description: |
        Synchronous (returns `201 Created`). Writes static routes onto the
        KubeOVN Vpc CRD immediately.

        In M2 all routes apply at the VPC level (per-subnet differentiation
        is informational only — see `/associations`).

        The VNet must be `ACTIVE`.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRouteTableRequest"
            example:
              name: rt-default
              description: Default route table
              routes:
                - name: internet-egress
                  destination_cidr: "0.0.0.0/0"
                  next_hop_type: internet
      responses:
        "201":
          description: Route table created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteTable"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: listRouteTables
      tags: [networking-route-tables]
      summary: List route tables within a VNet
      responses:
        "200":
          description: List of route tables
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RouteTable"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/vnets/{vnet_id}/route-tables/{rt_id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/VNetID"
      - name: rt_id
        in: path
        required: true
        description: UUID of the route table
        schema:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000031

    get:
      operationId: getRouteTable
      tags: [networking-route-tables]
      summary: Get a route table by UUID
      responses:
        "200":
          description: Route table resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteTable"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateRouteTableRoutes
      tags: [networking-route-tables]
      summary: Replace all routes in a route table (synchronous)
      description: |
        Replaces the entire route set and writes it to the KubeOVN Vpc CRD
        immediately. Returns the updated route table with `200 OK`.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [routes]
              properties:
                routes:
                  type: array
                  items:
                    $ref: "#/components/schemas/RouteRule"
      responses:
        "200":
          description: Updated route table
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteTable"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteRouteTable
      tags: [networking-route-tables]
      summary: Delete a route table (synchronous)
      description: |
        Removes routes from the KubeOVN Vpc CRD and deletes the DB row.
        Returns `204 No Content`.

        **Required role**: `owner`.
      responses:
        "204":
          description: Route table deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/vnets/{vnet_id}/route-tables/{rt_id}/associations:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/VNetID"
      - name: rt_id
        in: path
        required: true
        description: UUID of the route table
        schema:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000031

    post:
      operationId: associateRouteTable
      tags: [networking-route-tables]
      summary: Associate a route table with a subnet (informational in M2)
      description: |
        Records the association in the DB and returns `201 Created` with a
        `warning` field indicating that per-subnet routing is informational
        only in M2 — all routes apply at the VPC level. Per-subnet OVN
        policy routes are slated for M2.5.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subnet_id]
              properties:
                subnet_id:
                  type: string
                  format: uuid
                  description: UUID of the subnet to associate
                  example: 3a1c2e5d-0000-0000-0000-000000000021
      responses:
        "201":
          description: Association created (informational in M2)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteTableAssociation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/vnets/{vnet_id}/route-tables/{rt_id}/associations/{assoc_id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/VNetID"
      - name: rt_id
        in: path
        required: true
        description: UUID of the route table
        schema:
          type: string
          format: uuid
      - name: assoc_id
        in: path
        required: true
        description: UUID of the association
        schema:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000041

    delete:
      operationId: disassociateRouteTable
      tags: [networking-route-tables]
      summary: Remove a route table–subnet association
      description: |
        Removes the association record. Returns `204 No Content`.

        **Required role**: `owner`.
      responses:
        "204":
          description: Association removed
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Peerings ───────────────────────────────────────────────────────────────────

  /v1/tenants/{tenant_id}/projects/{project_id}/vnets/{vnet_id}/peerings:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/VNetID"

    post:
      operationId: createPeering
      tags: [networking-peerings]
      summary: Create a VNet peering (async)
      description: |
        Creates a KubeOVN VpcPeering CRD and installs reciprocal static routes
        on both Vpc CRDs. Returns `202 Accepted`.

        Constraints:
        - `peer_vnet_id` must belong to the same tenant
        - Both VNets must be `ACTIVE`
        - Both VNets must be in the same region (cross-region deferred)
        - Address spaces must not overlap
        - Only one peering may exist between any two VNets

        `allow_forwarded_traffic` is stored but not enforced in M2.
        The response includes a `warning` field when it is `true`.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePeeringRequest"
            example:
              name: prod-to-dev
              peer_vnet_id: 3a1c2e5d-0000-0000-0000-000000000011
              allow_forwarded_traffic: false
      responses:
        "202":
          description: |
            Peering creation accepted. Poll GET /v1/vnets/{vnet_id}/peerings/{peering_id}.
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsyncNetworkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: listPeerings
      tags: [networking-peerings]
      summary: List peerings for a VNet
      responses:
        "200":
          description: List of peerings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Peering"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/vnets/{vnet_id}/peerings/{peering_id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/VNetID"
      - name: peering_id
        in: path
        required: true
        description: UUID of the peering
        schema:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000051

    get:
      operationId: getPeering
      tags: [networking-peerings]
      summary: Get a peering by UUID
      responses:
        "200":
          description: Peering resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Peering"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deletePeering
      tags: [networking-peerings]
      summary: Delete a VNet peering (async)
      description: |
        Marks the peering DELETING and triggers async removal of the
        KubeOVN VpcPeering CRD and reciprocal static routes.

        **Required role**: `owner`.
      responses:
        "202":
          description: Deletion accepted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Network Security Groups ────────────────────────────────────────────────────

  /v1/tenants/{tenant_id}/projects/{project_id}/security-groups:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"

    post:
      operationId: createSecurityGroup
      tags: [networking-nsgs]
      summary: Create a network security group (synchronous)
      description: |
        Creates an NSG and optionally populates its initial rule set.
        Synchronous — returns `201 Created`.

        NSGs are tenant-scoped (not VNet-scoped). They can be attached to
        subnets via `POST /v1/security-groups/{sg_id}/attachments`.

        NIC-level attachment (`target_type: nic`) is deferred to M3.

        Rule priorities must be unique within a direction (inbound/outbound)
        within one NSG.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNSGRequest"
            example:
              name: web-sg
              description: Allow HTTP/HTTPS inbound
              rules:
                - name: allow-https
                  direction: inbound
                  priority: 100
                  protocol: tcp
                  source_address_prefix: "*"
                  source_port_range: "*"
                  destination_address_prefix: "*"
                  destination_port_range: "443"
                  action: allow
      responses:
        "201":
          description: NSG created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NSG"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: listSecurityGroups
      tags: [networking-nsgs]
      summary: List NSGs for the authenticated tenant
      responses:
        "200":
          description: List of NSGs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NSG"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/security-groups/{sg_id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - name: sg_id
        in: path
        required: true
        description: UUID of the NSG
        schema:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000061

    get:
      operationId: getSecurityGroup
      tags: [networking-nsgs]
      summary: Get an NSG by UUID
      description: Returns the NSG with its full rule set and attachment list.
      responses:
        "200":
          description: NSG resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NSG"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteSecurityGroup
      tags: [networking-nsgs]
      summary: Delete an NSG (synchronous)
      description: |
        Removes the KubeOVN SecurityGroup CRD entry and deletes the DB row.
        Returns 409 if any attachments exist — detach them first.

        **Required role**: `owner`.
      responses:
        "204":
          description: NSG deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: NSG has active attachments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "NSG has active attachments; detach them first: 3a1c..."
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/security-groups/{sg_id}/rules:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - name: sg_id
        in: path
        required: true
        description: UUID of the NSG
        schema:
          type: string
          format: uuid

    put:
      operationId: updateSecurityGroupRules
      tags: [networking-nsgs]
      summary: Replace all rules in an NSG (synchronous)
      description: |
        Replaces the entire rule set and pushes changes to KubeOVN immediately.
        Returns the updated NSG with `200 OK`.

        Rule priorities must be unique within a direction within the NSG.
        Submit an empty `rules` array to remove all rules.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rules]
              properties:
                rules:
                  type: array
                  items:
                    $ref: "#/components/schemas/NSGRule"
      responses:
        "200":
          description: Updated NSG
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NSG"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/security-groups/{sg_id}/attachments:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - name: sg_id
        in: path
        required: true
        description: UUID of the NSG
        schema:
          type: string
          format: uuid

    post:
      operationId: attachSecurityGroup
      tags: [networking-nsgs]
      summary: Attach an NSG to a subnet (synchronous)
      description: |
        Writes NSG ACLs to the KubeOVN Subnet CRD and records the attachment.
        Returns `201 Created`.

        In M2, `target_type` must be `"subnet"`. Providing `"nic"` returns
        400 (NIC-level NSG is deferred to M3).

        The target subnet must belong to the same tenant.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachNSGRequest"
            example:
              target_type: subnet
              target_id: 3a1c2e5d-0000-0000-0000-000000000021
      responses:
        "201":
          description: NSG attached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NSGAttachment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/security-groups/{sg_id}/attachments/{attachment_id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - name: sg_id
        in: path
        required: true
        description: UUID of the NSG
        schema:
          type: string
          format: uuid
      - name: attachment_id
        in: path
        required: true
        description: UUID of the attachment
        schema:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000071

    delete:
      operationId: detachSecurityGroup
      tags: [networking-nsgs]
      summary: Detach an NSG from a subnet (synchronous)
      description: |
        Removes NSG ACLs from the KubeOVN Subnet CRD and deletes the
        attachment record. Returns `204 No Content`.

        **Required role**: `owner`.
      responses:
        "204":
          description: NSG detached
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Auth (F7 BFF) ────────────────────────────────────────────────────────────
  #
  # These four endpoints are NOT behind the bearerAuth security scheme.
  # HandleLogin and HandleCallback are public (browser hits them with no token).
  # HandleLogout and HandleMe read the dcapi_session cookie directly.
  # All four are only registered when DCAPI_BFF_SESSION_SECRET is set.

  /v1/auth/login:
    get:
      operationId: authLogin
      tags: [auth]
      summary: Initiate OIDC authorization-code flow
      security: []
      description: |
        Generates a PKCE code verifier + challenge and a nonce, seals them into
        a short-lived encrypted `dcapi_oidc_state` cookie, then redirects the
        browser to Asgardeo's authorize endpoint.

        The browser follows the redirect to Asgardeo, the user authenticates
        there, and Asgardeo redirects the browser back to `GET /v1/auth/callback`.

        **Open-redirect protection** — the optional `return_to` query parameter
        is accepted only when it is an absolute URL whose scheme and host match
        the configured cloud-ui origin (`DCAPI_BFF_POST_LOGIN_REDIRECT`). Any
        other value (different host, relative URL, missing scheme) is silently
        discarded and the configured default is used instead.

        **Cookie set on success:**

        | Name | Path | Attributes | Max-Age |
        |---|---|---|---|
        | `dcapi_oidc_state` | `/v1/auth` | HttpOnly; Secure (prod); SameSite=Lax | 300 s |

        The `dcapi_oidc_state` value is AES-GCM encrypted and carries the PKCE
        verifier, the nonce, and the sanitised `return_to`.

        **Internal crypto errors** (PKCE verifier generation, nonce generation,
        or cookie sealing failures) return `500` instead of a redirect; these
        should never occur in normal operation.
      parameters:
        - name: return_to
          in: query
          required: false
          description: |
            Absolute URL to redirect to after a successful login. Must share
            scheme and host with the configured cloud-ui origin. Any other
            value is silently ignored.
          schema:
            type: string
            format: uri
            example: https://cloud.lk.wso2.com/projects/iam-platform
      responses:
        "302":
          description: |
            Redirect to Asgardeo's authorize endpoint. Sets the
            `dcapi_oidc_state` cookie. The browser follows the redirect
            automatically.
          headers:
            Location:
              description: Asgardeo authorize URL with PKCE + nonce parameters
              schema:
                type: string
                example: >-
                  https://api.asgardeo.io/t/wso2/oauth2/authorize?response_type=code
                  &client_id=cloud-ui-cid&redirect_uri=...&code_challenge=...
                  &code_challenge_method=S256&nonce=...
            Set-Cookie:
              description: >-
                dcapi_oidc_state=<sealed>; Path=/v1/auth; HttpOnly;
                Secure; SameSite=Lax; Max-Age=300
              schema:
                type: string
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/auth/callback:
    get:
      operationId: authCallback
      tags: [auth]
      summary: Complete OIDC authorization-code exchange
      security: []
      description: |
        Asgardeo redirects the browser here after the user authenticates.
        The handler:
        1. Reads and decrypts the `dcapi_oidc_state` cookie to recover the
           PKCE verifier and nonce.
        2. Verifies that the `state` query parameter echoed by Asgardeo
           matches the nonce in the cookie (tamper check).
        3. Exchanges the authorization `code` for tokens at Asgardeo's
           token endpoint, presenting the PKCE verifier.
        4. Verifies the returned `id_token` — checks issuer, signature, and
           nonce.
        5. Seals a `dcapi_session` cookie containing the access token and
           identity claims, then redirects the browser to the cloud-ui
           origin (or the validated `return_to` carried in the state cookie).

        **Cookies mutated on success:**

        | Name | Action | Path | Attributes | Max-Age |
        |---|---|---|---|---|
        | `dcapi_session` | Set | `/` | HttpOnly; Secure (prod); SameSite=Lax | Access-token TTL |
        | `dcapi_oidc_state` | Cleared | `/v1/auth` | HttpOnly; Secure (prod); SameSite=Lax | -1 |

        The `dcapi_session` value is AES-GCM encrypted and contains the
        access token, refresh token, expiry, OIDC `sub`, and email.

        **Error responses** do not perform a redirect — they return an HTTP
        status with a plain-text body (produced by `http.Error`). These
        are not the standard JSON `{"error":"..."}` envelope because the
        browser is the client at this point, not cloud-ui's fetch layer.
      parameters:
        - name: code
          in: query
          required: true
          description: Authorization code issued by Asgardeo
          schema:
            type: string
            example: eyJh...abc
        - name: state
          in: query
          required: true
          description: |
            Opaque state value echoed by Asgardeo. Must match the nonce
            stored in the `dcapi_oidc_state` cookie; otherwise returns 400.
          schema:
            type: string
            example: a1b2c3d4e5f6
      responses:
        "302":
          description: |
            Login successful. Sets the `dcapi_session` cookie, clears
            `dcapi_oidc_state`, and redirects to the cloud-ui origin
            (or `return_to` from the state cookie).
          headers:
            Location:
              description: Post-login URL (cloud-ui origin or validated return_to)
              schema:
                type: string
                example: https://cloud.lk.wso2.com/
            Set-Cookie:
              description: >-
                dcapi_session=<sealed>; Path=/; HttpOnly; Secure; SameSite=Lax;
                Max-Age=<token-ttl-seconds>
              schema:
                type: string
        "400":
          description: |
            Missing or invalid state cookie, state parameter mismatch, or
            cookie decryption failure. The `dcapi_oidc_state` cookie may
            have expired (5-minute window) or the request was tampered with.
            The user should restart the sign-in flow.
          content:
            text/plain:
              schema:
                type: string
                example: "state mismatch — sign-in aborted"
        "500":
          description: |
            Internal crypto or serialisation error when sealing the session
            cookie. Should not occur in normal operation.
          content:
            text/plain:
              schema:
                type: string
                example: "encode session"
        "502":
          description: |
            Upstream failure — Asgardeo's token endpoint returned an error,
            the `id_token` was missing from the response, or `id_token`
            verification (signature or nonce) failed. The user should retry;
            if the problem persists, the IdP may be misconfigured.
          content:
            text/plain:
              schema:
                type: string
                example: "token exchange failed"

  /v1/auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      summary: Clear session cookie and redirect to IdP end-session
      security: []
      description: |
        Clears the `dcapi_session` cookie and redirects the browser to
        Asgardeo's `end_session_endpoint` (discovered from the OIDC discovery
        document). Asgardeo invalidates the IdP session and bounces the browser
        back to the configured post-logout URL (`DCAPI_BFF_POST_LOGOUT_REDIRECT`).

        If the discovery document did not include `end_session_endpoint`,
        the handler falls back to a local redirect to the configured
        post-logout URL. In either case the `dcapi_session` cookie is cleared
        first.

        **POST — not GET** — a `GET /logout` linked from the page is trivially
        CSRF-able because browsers follow same-site links freely. Requiring a
        POST (from a form or `fetch`) plus `SameSite=Lax` on the session cookie
        is the standard mitigation.

        **Auth is optional** — if no `dcapi_session` cookie is present the
        handler still performs the redirect, just without an `id_token_hint`.
        If a valid session cookie is present, the `id_token_hint` (access token)
        is included in the Asgardeo end-session redirect so Asgardeo can
        target the exact authentication event.

        **Cookie mutated:**

        | Name | Action | Path | Attributes | Max-Age |
        |---|---|---|---|---|
        | `dcapi_session` | Cleared | `/` | HttpOnly; Secure (prod); SameSite=Lax | -1 |

        **Internal errors** — the only non-302 response is `500`, returned when
        the `end_session_endpoint` URL discovered from Asgardeo cannot be
        parsed. The cookie is still cleared before the error is returned.
      responses:
        "302":
          description: |
            Always returned on success (whether or not a session was present).
            If Asgardeo advertised `end_session_endpoint`, the redirect target
            is that URL with `id_token_hint`, `client_id`, and
            `post_logout_redirect_uri` query parameters. Otherwise redirects
            directly to the configured post-logout URL.
          headers:
            Location:
              description: >-
                Asgardeo end-session URL, or the configured post-logout URL
                when end-session is not available.
              schema:
                type: string
                example: >-
                  https://api.asgardeo.io/t/wso2/oidc/logout?id_token_hint=...
                  &client_id=cloud-ui-cid&post_logout_redirect_uri=...
            Set-Cookie:
              description: >-
                dcapi_session=; Path=/; HttpOnly; Secure; SameSite=Lax;
                Max-Age=-1
              schema:
                type: string
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/auth/me:
    get:
      operationId: authMe
      tags: [auth]
      summary: Return current user identity from the session cookie
      security: []
      description: |
        Returns the identity embedded in the `dcapi_session` cookie set by
        `GET /v1/auth/callback`. cloud-ui calls this on app load to populate
        its `AuthProvider` context (display name, email, token expiry).

        This endpoint does **not** re-verify the access token's signature —
        the auth middleware already does that on every `/v1/*` call, and
        `/v1/auth/me` is designed to be cheap for the SPA to call on mount.
        It reads the encrypted session cookie, checks that the session has not
        expired, and returns the cached identity fields.

        **Auth**: reads the `dcapi_session` cookie directly. Does **not** use
        the `bearerAuth` scheme. Returns `401` when no cookie is present, the
        cookie cannot be decrypted, or the session is past its `expires_at`.

        **Note on 401 response format**: the `401` response body is plain text
        (`text/plain`) produced by `http.Error`, not the standard JSON
        `{"error":"..."}` envelope used by the `/v1/*` authenticated endpoints.
        cloud-ui should treat any non-200 response from this endpoint as
        "not signed in" and redirect to `/v1/auth/login`.
      responses:
        "200":
          description: Current user identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMe"
              example:
                sub: "01abc123-0000-0000-0000-user000000001"
                email: "alice@example.com"
                expires_at: "2026-05-16T12:00:00Z"
                is_admin: false
                tenants: ["test", "cs-team"]
        "401":
          description: |
            No `dcapi_session` cookie present, cookie decryption failed,
            or session is past its expiry.
          content:
            text/plain:
              schema:
                type: string
                example: "no session"

  # ── Key Vaults (M3 chunk 1 — logical record only) ────────────────────────────

  /v1/tenants/{tenant_id}/projects/{project_id}/keyvaults:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"

    post:
      operationId: createKeyVault
      tags: [keyvaults]
      summary: Create a Key Vault (synchronous)
      description: |
        Creates a Key Vault as a logical container for secrets. Synchronous —
        returns `201 Created` with status `ACTIVE`.

        Chunk 1 stores only the vault metadata (name, tenant ownership, soft-
        delete window). Later chunks add per-VPC Private Endpoints, access
        policies, and the OpenBao-backed secret data plane.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKeyVaultRequest"
            example:
              name: billing-secrets
              soft_delete_days: 30
      responses:
        "201":
          description: Key Vault created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyVault"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: listKeyVaults
      tags: [keyvaults]
      summary: List Key Vaults for the authenticated tenant
      responses:
        "200":
          description: List of Key Vaults
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KeyVault"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/keyvaults/{id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - name: id
        in: path
        required: true
        description: UUID of the Key Vault
        schema:
          type: string
          format: uuid
          example: 6f1c4d2a-0000-0000-0000-000000000071

    get:
      operationId: getKeyVault
      tags: [keyvaults]
      summary: Get a Key Vault by UUID
      responses:
        "200":
          description: Key Vault resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyVault"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteKeyVault
      tags: [keyvaults]
      summary: Delete a Key Vault
      description: |
        Hard-deletes the Key Vault row. Chunk 1 has no secret data plane, so
        this is immediate. When the OpenBao mount lands the same endpoint
        becomes a soft delete + reconciler-driven teardown.

        **Required role**: `member` or `owner`.
      responses:
        "204":
          description: Key Vault deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/keyvaults/{id}/credentials:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - name: id
        in: path
        required: true
        description: UUID of the Key Vault
        schema:
          type: string
          format: uuid

    get:
      operationId: getKeyVaultCredentials
      tags: [keyvaults]
      summary: Retrieve the Key Vault's AppRole credentials (shown once)
      description: |
        Returns the AppRole credentials that the operator provisioned for this
        Key Vault. **The response is shown exactly once** — subsequent calls
        return `410 Gone`. The caller MUST store the response immediately;
        dc-api never holds these values server-side after the first read.

        Pre-conditions:
          - The vault must have `status=ACTIVE` (operator finished
            init+unseal+mount+AppRole). Otherwise: 409 Conflict.
          - The operator integration (KVI) must be wired into this dc-api
            deployment. Otherwise: 501 Not Implemented.

        **Required role**: `member` or `owner`.
      responses:
        "200":
          description: AppRole credentials (shown once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyVaultCredentials"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Vault not Ready yet — poll GET .../{id} until status=ACTIVE
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: Credentials already retrieved once and cannot be retrieved again
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"
        "501":
          description: KVI operator integration not enabled on this deployment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/tenants/{tenant_id}/projects/{project_id}/keyvaults/{id}/credentials/rotate:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - name: id
        in: path
        required: true
        description: UUID of the Key Vault
        schema:
          type: string
          format: uuid

    post:
      operationId: rotateKeyVaultCredentials
      tags: [keyvaults]
      summary: Rotate the Key Vault's AppRole credentials (shown once)
      description: |
        Atomically rotates the AppRole credentials backing this Key Vault:

          1. Destroys every active `secret_id` accessor on the AppRole.
             Old credentials stop working IMMEDIATELY — any in-flight
             workload login that hasn't completed will fail.
          2. Mints a fresh `secret_id`.
          3. Patches the in-cluster credentials Secret so anything reading
             it directly sees the new value (the `role_id` is stable
             across rotation).
          4. Stamps `credentials_consumed_at` so subsequent
             `GET .../credentials` calls return `410 Gone` — the rotation
             response IS the "shown once" event.

        Same shown-once contract as create-time `GET .../credentials`. The
        caller MUST store the response immediately; dc-api never holds the
        `secret_id` server-side after returning it.

        Pre-conditions:
          - The vault must have `status=ACTIVE`.
          - The operator integration (KVI) must be wired.

        **Required role**: `member` or `owner`.
      responses:
        "200":
          description: New AppRole credentials (shown once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyVaultCredentials"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Vault not Ready yet — poll GET .../{id} until status=ACTIVE
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"
        "501":
          description: KVI operator integration not enabled on this deployment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ── Key Vault Private Endpoints (M3 chunk 2 — generic, reused per service) ───

  /v1/tenants/{tenant_id}/projects/{project_id}/keyvaults/{id}/private-endpoints:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - name: id
        in: path
        required: true
        description: UUID of the parent Key Vault
        schema: { type: string, format: uuid }

    post:
      operationId: createKeyVaultPrivateEndpoint
      tags: [keyvaults]
      summary: Create a Private Endpoint into a tenant VPC (synchronous)
      description: |
        Stands up a dual-NIC nginx proxy on Harvester (in the dc-api-endpoints
        namespace) with one NIC pinned to a VIP allocated from the tenant
        subnet and the other on the cluster default network forwarding to the
        Key Vault's backend (OpenBao Service). Updates the tenant's per-VPC
        CoreDNS Corefile so the resulting hostname resolves only inside that
        VPC.

        The same generic primitive will back Postgres / Valkey / Harbor Private
        Endpoints when those land — only the backend address differs.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePrivateEndpointRequest"
            example:
              name: billing-vault
              vnet_id:   3a1c2e5d-0000-0000-0000-000000000010
              subnet_id: 3a1c2e5d-0000-0000-0000-000000000020
      responses:
        "201":
          description: Private Endpoint created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateEndpoint"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalError" }

    get:
      operationId: listKeyVaultPrivateEndpoints
      tags: [keyvaults]
      summary: List Private Endpoints for a Key Vault
      responses:
        "200":
          description: Endpoint list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PrivateEndpoint"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /v1/tenants/{tenant_id}/projects/{project_id}/keyvaults/{id}/private-endpoints/{ep_id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - name: id
        in: path
        required: true
        description: UUID of the parent Key Vault
        schema: { type: string, format: uuid }
      - name: ep_id
        in: path
        required: true
        description: UUID of the Private Endpoint
        schema: { type: string, format: uuid }

    get:
      operationId: getKeyVaultPrivateEndpoint
      tags: [keyvaults]
      summary: Get a Private Endpoint by UUID
      responses:
        "200":
          description: Endpoint resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateEndpoint"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

    delete:
      operationId: deleteKeyVaultPrivateEndpoint
      tags: [keyvaults]
      summary: Delete a Private Endpoint (synchronous)
      description: |
        Tears down the proxy Deployment + ConfigMap + Vip, regenerates the
        per-VPC Corefile without this endpoint's record, then removes the row.

        **Required role**: `member` or `owner`.
      responses:
        "204":
          description: Endpoint deleted
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  # ── Key Vault Secrets (M3 chunk 3 — human-driven CRUD via OpenBao KV-v2) ──────

  /v1/tenants/{tenant_id}/projects/{project_id}/keyvaults/{id}/secrets:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - name: id
        in: path
        required: true
        description: UUID of the parent Key Vault
        schema:
          type: string
          format: uuid
          example: 6f1c4d2a-0000-0000-0000-000000000071

    get:
      operationId: listKeyVaultSecrets
      tags: [keyvaults]
      summary: List secret names in a Key Vault (no values returned)
      description: |
        Returns a page of `KeyVaultSecretSummary` objects. Only secret **names**,
        version numbers, and timestamps are returned — values are never included
        in list responses.

        Soft-deleted secrets (with a non-null `deleted_at`) are included in the
        list so callers can see what is pending purge and still within the vault's
        `soft_delete_days` window.

        Cursor-based pagination: supply `?cursor=<opaque>` from the previous
        response's `next_cursor` field. Omit for the first page.

        **Required role**: `viewer`, `member`, or `owner`.
      parameters:
        - name: cursor
          in: query
          required: false
          description: |
            Opaque pagination cursor returned by the previous response's
            `next_cursor` field. Omit to start from the first page.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: |
            Maximum number of secrets to return per page. Default 100; max 500.
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Paginated list of secret name summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyVaultSecretListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/keyvaults/{id}/secrets/{key}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - name: id
        in: path
        required: true
        description: UUID of the parent Key Vault
        schema:
          type: string
          format: uuid
          example: 6f1c4d2a-0000-0000-0000-000000000071
      - name: key
        in: path
        required: true
        description: |
          Secret key name. Lowercase alphanumerics, hyphens (`-`), underscores
          (`_`), and dots (`.`). 1..256 characters. No slashes — nested paths
          are a future enhancement.
        schema:
          type: string
          pattern: '^[a-z0-9._-]{1,256}$'
          example: db-password

    get:
      operationId: getKeyVaultSecret
      tags: [keyvaults]
      summary: Retrieve a secret value from a Key Vault
      description: |
        Returns the latest version of the secret including its plaintext value,
        version number, and any metadata stored alongside it.

        Pass `?version=<N>` to retrieve a specific historical version from
        KV-v2's version chain. Historical versions of soft-deleted secrets are
        accessible by version number.

        **Soft-delete behaviour**: if the latest version has been soft-deleted
        and `?version` is not supplied, dc-api returns `410 Gone` — the key
        still exists in the version chain but its active tip is deleted. Supply
        an explicit `?version=<N>` to read prior versions.

        **Required role**: `member` or `owner`. Callers with `viewer` role
        receive `403 Forbidden`.
      parameters:
        - name: version
          in: query
          required: false
          description: |
            KV-v2 version number to retrieve. Positive integer. Omit to get the
            latest version. Useful for reading history or accessing a version that
            predates a soft-delete.
          schema:
            type: integer
            minimum: 1
            example: 3
      responses:
        "200":
          description: Secret value and metadata for the requested version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyVaultSecret"
              example:
                key: db-password
                value: "s3cr3t-hunter2"
                version: 4
                metadata:
                  owner: billing-team
                  rotated_by: ci-pipeline
                created_at: "2026-05-20T12:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Key never existed in this vault
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: |
            Secret has been soft-deleted and no explicit `?version` was provided.
            The key and its prior versions remain accessible for the parent
            vault's `soft_delete_days` window; pass `?version=<N>` to retrieve
            a historical version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "secret 'db-password' is soft-deleted; specify ?version=N to read a prior version"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      operationId: putKeyVaultSecret
      tags: [keyvaults]
      summary: Write (create or update) a secret in a Key Vault
      description: |
        Writes a new value for the named key into the vault's KV-v2 mount.
        dc-api proxies the write to OpenBao using the per-Backend root token it
        already holds; the caller never sees an OpenBao token.

        KV-v2 is always append-only: every successful PUT creates a new
        version. Prior versions are retained according to the KV-v2 engine's
        `max_versions` policy (inherited from the mount; dc-api does not
        expose this parameter in v1).

        - **201 Created**: the key had no prior version (first write).
        - **200 OK**: the key already existed; a new version was appended.

        The response body contains the just-written version.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeyVaultSecretCreateRequest"
            example:
              value: "s3cr3t-hunter2"
              metadata:
                owner: billing-team
                rotated_by: ci-pipeline
      responses:
        "201":
          description: Secret created (first version)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyVaultSecret"
        "200":
          description: New version of existing secret written
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyVaultSecret"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteKeyVaultSecret
      tags: [keyvaults]
      summary: Soft-delete the latest version of a secret
      description: |
        Marks the latest version of the named secret as deleted in KV-v2.
        This is a **soft delete only** — dc-api instructs OpenBao to delete
        (not destroy) the secret. The key and all prior versions remain in
        the KV-v2 version chain and are still readable by version number
        via `GET .../secrets/{key}?version=N`.

        KV-v2 on the parent vault's `soft_delete_days` window automatically
        purges (destroys) all versions once the window expires. Until then the
        key appears in `GET .../secrets` with a non-null `deleted_at` field.

        - **204 No Content**: soft-delete succeeded.
        - **404 Not Found**: the key name was never written to this vault.
        - **409 Conflict**: the latest version is already soft-deleted. To
          truly remove the key before the purge window, an operator must
          destroy it directly in OpenBao; dc-api v1 does not expose a destroy
          endpoint.

        **Required role**: `member` or `owner`.
      responses:
        "204":
          description: Soft-delete accepted; key is now in the deleted state
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Key name was never written to this vault
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Latest version of this secret is already soft-deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "secret 'db-password' is already soft-deleted"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/keyvaults/{id}/secrets/{key}/restore:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - name: id
        in: path
        required: true
        description: UUID of the parent Key Vault
        schema:
          type: string
          format: uuid
      - name: key
        in: path
        required: true
        description: Secret key name (must match the same pattern as PUT/GET).
        schema:
          type: string
          pattern: '^[a-z0-9._-]{1,256}$'
    post:
      operationId: restoreKeyVaultSecret
      tags: [keyvaults]
      summary: Restore the latest soft-deleted version of a secret
      description: |
        Reverses a soft-delete by calling OpenBao's KV-v2 `undelete` on the
        secret's latest deleted version. After restore, the key returns to the
        readable state (the `deleted_at` field clears from list output, and
        `GET .../secrets/{key}` without `?version` returns the value again).

        This only works while the parent vault's `soft_delete_days` window
        has not yet elapsed. Once KV-v2 purges (destroys) the version, it is
        unrecoverable and dc-api responds 410 Gone.

        - **204 No Content**: restore succeeded.
        - **404 Not Found**: key name was never written to this vault.
        - **409 Conflict**: latest version is not in the deleted state
          (nothing to restore).
        - **410 Gone**: all versions have been hard-destroyed (e.g. the
          soft-delete window elapsed and KV-v2 already purged them).

        **Required role**: `member` or `owner`.
      responses:
        "204":
          description: Restore accepted; the latest version is readable again
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Key name was never written to this vault
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Latest version is not soft-deleted (nothing to restore)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: All versions have been hard-destroyed; restore impossible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Private DNS Zones ─────────────────────────────────────────────────────────

  /v1/tenants/{tenant_id}/projects/{project_id}/vnets/{vnet_id}/dns-zones:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/VNetID"

    post:
      operationId: createDNSZone
      tags: [networking-private-dns]
      summary: Create a private DNS zone (async)
      description: |
        Creates a KubeOVN VpcDns CRD + CoreDNS ConfigMap entry. Returns
        `202 Accepted`. The zone name must be a valid DNS name
        (e.g. `internal.lk.wso2.com`). Cross-tenant name collisions are
        allowed; uniqueness is enforced per `(vnet_id, zone_name)` only.

        The parent VNet must be `ACTIVE`.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDNSZoneRequest"
            example:
              name: internal.lk.wso2.com
              description: Internal WSO2 LK services
      responses:
        "202":
          description: |
            DNS zone creation accepted.
            Poll GET /v1/vnets/{vnet_id}/dns-zones/{zone_id}.
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsyncNetworkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: listDNSZones
      tags: [networking-private-dns]
      summary: List private DNS zones within a VNet
      responses:
        "200":
          description: List of DNS zones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DNSZone"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/vnets/{vnet_id}/dns-zones/{zone_id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/VNetID"
      - name: zone_id
        in: path
        required: true
        description: UUID of the DNS zone
        schema:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000081

    get:
      operationId: getDNSZone
      tags: [networking-private-dns]
      summary: Get a DNS zone by UUID
      responses:
        "200":
          description: DNS zone resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DNSZone"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteDNSZone
      tags: [networking-private-dns]
      summary: Delete a private DNS zone (async)
      description: |
        Marks the zone DELETING and triggers async removal from KubeOVN/CoreDNS.

        **Required role**: `owner`.
      responses:
        "202":
          description: Deletion accepted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/vnets/{vnet_id}/dns-zones/{zone_id}/records:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/VNetID"
      - name: zone_id
        in: path
        required: true
        description: UUID of the DNS zone
        schema:
          type: string
          format: uuid

    post:
      operationId: upsertDNSRecord
      tags: [networking-private-dns]
      summary: Create or update a DNS record (synchronous upsert)
      description: |
        Upserts a DNS record within the zone and immediately patches the
        KubeOVN CoreDNS ConfigMap. Returns `201 Created` (both create and
        update paths return 201 for idempotency).

        Supported `type` values: `A`, `AAAA`, `CNAME`, `SRV`, `TXT`, `MX`.
        `ttl` defaults to 300s if omitted; min 30; max 86400.

        The zone must be `ACTIVE`.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDNSRecordRequest"
            example:
              name: api
              type: A
              ttl: 60
              values:
                - 10.10.1.50
      responses:
        "201":
          description: DNS record created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DNSRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: listDNSRecords
      tags: [networking-private-dns]
      summary: List DNS records within a zone
      responses:
        "200":
          description: List of DNS records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DNSRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/vnets/{vnet_id}/dns-zones/{zone_id}/records/{record_id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/VNetID"
      - name: zone_id
        in: path
        required: true
        description: UUID of the DNS zone
        schema:
          type: string
          format: uuid
      - name: record_id
        in: path
        required: true
        description: UUID of the DNS record
        schema:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000091

    get:
      operationId: getDNSRecord
      tags: [networking-private-dns]
      summary: Get a DNS record by UUID
      responses:
        "200":
          description: DNS record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DNSRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateDNSRecord
      tags: [networking-private-dns]
      summary: Update a DNS record (values and TTL only)
      description: |
        Updates the `values` and/or `ttl` of an existing record. `name` and
        `type` are immutable after creation. Returns the updated record with
        `200 OK`.

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                values:
                  type: array
                  items:
                    type: string
                  description: New record values (required)
                ttl:
                  type: integer
                  description: TTL in seconds; defaults to existing TTL if omitted
              required: [values]
            example:
              values:
                - 10.10.1.55
              ttl: 120
      responses:
        "200":
          description: Updated DNS record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DNSRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteDNSRecord
      tags: [networking-private-dns]
      summary: Delete a DNS record (synchronous)
      description: |
        Removes the record from the KubeOVN CoreDNS ConfigMap and the DB.
        Returns `204 No Content`.

        **Required role**: `owner`.
      responses:
        "204":
          description: DNS record deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Task 1 — DBaaS Databases ───────────────────────────────────────────────
  /v1/tenants/{tenant_id}/projects/{project_id}/databases:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"

    post:
      operationId: createDatabase
      tags: [databases]
      summary: Create a managed Database (async)
      description: |
        Creates a managed PostgreSQL Database. dc-api inserts a `PENDING` row,
        then creates a `DBInstance` CR in the project namespace; the dbaas
        controller provisions the VM asynchronously. Caller polls
        `GET .../{id}` until `status` is `ACTIVE`, then retrieves the master
        credentials exactly once via `GET .../{id}/credentials`.

        **Network selection** is optional. When omitted, dc-api picks the
        project's first ACTIVE subnet (VPC mode). Specify a `network` block
        to pick a different subnet (VPC mode) or attach to a pre-existing
        Multus NAD (legacy mode — for VLAN-based deployments).

        **Required role**: `member` or `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDatabaseRequest"
            example:
              name: orders
              engine: postgres
              instance_class: db.t3.medium
              allocated_storage_gb: 50
      responses:
        "201":
          description: Database created (provisioning in progress)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Database"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: listDatabases
      tags: [databases]
      summary: List Databases in this project
      description: |
        Returns every Database in the (tenant, project) scope. Each row's
        `status` / `message` / `endpoint_address` / `endpoint_port` reflect
        the live `DBInstance` CR status, not just the DB-row snapshot.
      responses:
        "200":
          description: List of Databases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Database"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/databases/{id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - name: id
        in: path
        required: true
        description: UUID of the Database
        schema:
          type: string
          format: uuid
          example: 6f1c4d2a-0000-0000-0000-000000000071

    get:
      operationId: getDatabase
      tags: [databases]
      summary: Get a Database by UUID
      description: |
        Returns the DB row with live `DBInstance` CR status overlaid
        (`status`, `message`, `endpoint_address`, `endpoint_port`).
      responses:
        "200":
          description: Database resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Database"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteDatabase
      tags: [databases]
      summary: Delete a Database
      description: |
        Issues `DELETE` on the `DBInstance` CR (the controller's finalizer
        tears down the VM, DataVolumes, Service, and credentials Secret
        asynchronously) and drops the dc-api row immediately. Subsequent
        `GET` returns 404.

        **Required role**: `member` or `owner`.
      responses:
        "204":
          description: Database deletion accepted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tenants/{tenant_id}/projects/{project_id}/databases/{id}/credentials:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/ProjectID"
      - name: id
        in: path
        required: true
        description: UUID of the Database
        schema:
          type: string
          format: uuid

    get:
      operationId: getDatabaseCredentials
      tags: [databases]
      summary: Retrieve the Database's master credentials (shown once)
      description: |
        Returns the master user credentials the dbaas controller provisioned.
        **The response is shown exactly once** — subsequent calls return
        `410 Gone`. The caller MUST store the response immediately; dc-api
        never holds these values server-side after the first read.

        Pre-conditions:
          - The Database must have `status=ACTIVE` (controller finished
            provisioning and PostgreSQL is accepting connections). Otherwise:
            409 Conflict.
          - The dbaas operator integration must be wired into this dc-api
            deployment. Otherwise: 501 Not Implemented.

        **Required role**: `member` or `owner`.
      responses:
        "200":
          description: Database master credentials (shown once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseCredentials"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Database not Ready yet — poll GET .../{id} until status=ACTIVE
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: Credentials already retrieved once and cannot be retrieved again
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"
        "501":
          description: dbaas operator integration not enabled on this deployment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

# ── Components ─────────────────────────────────────────────────────────────────

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Accepts either:
        1. An Asgardeo OIDC JWT (RS256) — obtained via the PKCE flow (`dcctl login`).
        2. A DC-API service-account token with the format
           `dcapi_sa_<lookup_id>_<secret>` — issued by
           `POST /v1/tenants/{tenant_id}/service-accounts`.

  parameters:
    ResourceID:
      name: id
      in: path
      required: true
      description: UUID of the resource
      schema:
        type: string
        format: uuid
        example: 3a1c2e5d-1234-5678-abcd-000000000001

    TenantID:
      name: tenant_id
      in: path
      required: true
      description: Tenant identifier (slug, e.g. "iam-platform")
      schema:
        type: string
        pattern: '^[a-z][a-z0-9-]{0,30}[a-z0-9]$'
        minLength: 2
        maxLength: 32
        example: iam-platform

    ProjectID:
      name: project_id
      in: path
      required: true
      description: Project identifier (slug, e.g. "platform-infra")
      schema:
        type: string
        pattern: '^[a-z][a-z0-9-]{0,18}[a-z0-9]$'
        minLength: 2
        maxLength: 20
        example: platform-infra

    VNetID:
      name: vnet_id
      in: path
      required: true
      description: UUID of the virtual network
      schema:
        type: string
        format: uuid
        example: 3a1c2e5d-0000-0000-0000-000000000010

  responses:
    BadRequest:
      description: Bad request — validation error or malformed JSON
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "name is required"

    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "missing Authorization header"

    Forbidden:
      description: Insufficient role for this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "role 'member' is insufficient; 'owner' required"

    QuotaExceeded:
      description: Tenant quota exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "VM quota exceeded: 10/10 VMs in use"

    NotFound:
      description: Resource not found (also returned for cross-tenant access attempts)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "resource not found"

    Conflict:
      description: Conflict — duplicate resource name or invariant violation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "a VM named 'web-01' already exists (PENDING, ACTIVE, or DELETING)"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "failed to register resource"

    ServiceUnavailable:
      description: |
        Backend unavailable — OpenBao is sealed, in standby, or undergoing
        an upgrade. The caller should retry with exponential backoff.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "OpenBao backend is sealed; retry in a few seconds"

  schemas:

    # ── Core ───────────────────────────────────────────────────────────────────

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable description of what went wrong
          example: "name is required"

    ResourceStatus:
      type: string
      enum: [PENDING, ACTIVE, FAILED, DELETING]
      description: |
        Lifecycle status of any DC-API resource.
        - `PENDING` — accepted, provisioning in progress
        - `ACTIVE` — running and healthy
        - `FAILED` — provisioning or deletion failed
        - `DELETING` — deletion requested, async removal in progress

    # ── Projects ───────────────────────────────────────────────────────────────

    Project:
      type: object
      required: [id, tenant_id, project_uuid, name, cpu_cores, memory_gb, storage_gb,
                 max_vnets, max_clusters, max_volumes, max_public_ips, created_at, updated_at, created_by]
      properties:
        id:
          type: string
          description: Project slug — URL-safe identifier within the tenant
          example: platform-infra
        tenant_id:
          type: string
          description: Parent tenant slug
          example: iam-platform
        project_uuid:
          type: string
          format: uuid
          description: Immutable project UUID — use for filtering and FK references
          example: 7f3a1c2e-0000-0000-0000-000000000001
        name:
          type: string
          description: Human-readable display name
          example: Platform Infrastructure
        description:
          type: string
          description: Optional free-text description (max 512 chars)
          example: Core networking and compute for the platform team
        cpu_cores:
          type: integer
          description: Total vCPU quota for this project
          example: 20
        memory_gb:
          type: integer
          description: Total memory quota (GiB) for this project
          example: 64
        storage_gb:
          type: integer
          description: Total storage quota (GiB) for this project
          example: 500
        max_vnets:
          type: integer
          description: Maximum number of VNets allowed in this project
          example: 10
        max_clusters:
          type: integer
          description: Maximum number of clusters allowed in this project
          example: 2
        max_volumes:
          type: integer
          description: Maximum number of persistent volumes allowed
          example: 50
        max_public_ips:
          type: integer
          description: Maximum number of public IPs (SNAT EIPs) allowed
          example: 3
        created_at:
          type: string
          format: date-time
          example: "2026-05-20T08:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-05-20T08:00:00Z"
        created_by:
          type: string
          description: User ID of the project creator
          example: user@wso2.com

    CreateProjectRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
          description: Project slug — URL-safe ([a-z0-9-], starts with letter, max 48 chars)
          example: platform-infra
        name:
          type: string
          description: Human-readable name (defaults to id if omitted)
          example: Platform Infrastructure
        description:
          type: string
          description: Optional description (max 512 chars)
          example: Core networking and compute for the platform team
        cpu_cores:
          type: integer
          description: vCPU quota (default 20 when omitted)
          example: 20
        memory_gb:
          type: integer
          description: Memory quota GiB (default 64 when omitted)
          example: 64
        storage_gb:
          type: integer
          description: Storage quota GiB (default 500 when omitted)
          example: 500
        max_vnets:
          type: integer
          description: Max VNets (default 10 when omitted)
          example: 10
        max_clusters:
          type: integer
          description: Max clusters (default 2 when omitted)
          example: 2
        max_volumes:
          type: integer
          description: Max volumes (default 50 when omitted)
          example: 50
        max_public_ips:
          type: integer
          description: Max public IPs (default 3 when omitted)
          example: 3

    # ── Images / Networks ──────────────────────────────────────────────────────

    Image:
      type: object
      required: [id, display_name, namespace]
      properties:
        id:
          type: string
          description: |
            Composite identifier in the format `namespace/resource-name`.
            Pass this as `image_name` when creating a VM.
          example: default/image-rflb5
        display_name:
          type: string
          description: Human-readable name shown in the UI
          example: Ubuntu 22.04 LTS
        namespace:
          type: string
          description: Harvester namespace the image lives in
          example: default

    CreateImageRequest:
      type: object
      required: [display_name, url]
      properties:
        display_name:
          type: string
          description: Human-readable label for the image
          example: Ubuntu 22.04 LTS
        url:
          type: string
          format: uri
          description: HTTP(S) URL from which Harvester downloads the image
          example: https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img

    Network:
      type: object
      required: [id, display_name, namespace]
      properties:
        id:
          type: string
          description: |
            Composite identifier `namespace/resource-name`.
            Pass as `network_name` when creating a VM on the legacy bridge path.
          example: default/vm-net-100
        display_name:
          type: string
          description: Human-readable label (falls back to resource name)
          example: vm-net-100
        namespace:
          type: string
          example: default

    # ── Virtual Machines ───────────────────────────────────────────────────────

    CreateVirtualMachineRequest:
      type: object
      required: [name, size, image_name]
      properties:
        name:
          type: string
          description: Unique VM name within the tenant (max 63 chars)
          example: web-01
        size:
          type: string
          enum: [small, medium, large, xlarge]
          description: |
            Named instance size:
            - `small` — 2 vCPU / 4 GB RAM / 40 GB disk
            - `medium` — 4 vCPU / 8 GB RAM / 40 GB disk
            - `large` — 8 vCPU / 16 GB RAM / 80 GB disk
            - `xlarge` — 16 vCPU / 32 GB RAM / 160 GB disk
          example: medium
        disk_gb:
          type: integer
          minimum: 10
          description: |
            Optional root disk size override in GiB. Must be >= 10.
            Defaults to the size's default disk if omitted or 0.
          example: 80
        image_name:
          type: string
          description: Image ID from `GET /v1/images` (format `namespace/resource-name`)
          example: default/image-rflb5
        network_name:
          type: string
          description: |
            Legacy bridge network — from `GET /v1/networks`.
            Mutually exclusive with `vnet_id` + `subnet_id`.
          example: default/vm-net-100
        vnet_id:
          type: string
          format: uuid
          description: |
            M2 VPC path: UUID of the VNet to attach to.
            Must be `ACTIVE` and belong to the caller's tenant.
            Mutually exclusive with `network_name`. Requires `subnet_id`.
          example: 3a1c2e5d-0000-0000-0000-000000000010
        subnet_id:
          type: string
          format: uuid
          description: |
            M2 VPC path: UUID of the Subnet within the VNet.
            Must be `ACTIVE` and belong to the specified VNet.
            Requires `vnet_id`.
          example: 3a1c2e5d-0000-0000-0000-000000000021

    VirtualMachine:
      type: object
      required: [id, name, status, tenant_id, provider_type, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: Permanent UUID assigned at creation time
          example: 3a1c2e5d-1234-5678-abcd-000000000001
        name:
          type: string
          example: web-01
        size:
          type: string
          enum: [small, medium, large, xlarge]
          example: medium
        status:
          $ref: "#/components/schemas/ResourceStatus"
        tenant_id:
          type: string
          example: iam-platform
        provider_type:
          type: string
          description: Backend provider name (e.g. "harvester")
          example: harvester
        ip_address:
          type: string
          description: Primary IP address. Populated once the VM reaches ACTIVE.
          example: 10.10.1.50
        message:
          type: string
          description: Human-readable status detail or error message
          example: provisioning failed — timeout waiting for KubeVirt VM to start
        created_at:
          type: string
          format: date-time
          example: "2026-05-09T10:00:00Z"

    CreateVirtualMachineResponse:
      type: object
      required: [resource, private_key, console_password, note]
      properties:
        resource:
          $ref: "#/components/schemas/VirtualMachine"
        private_key:
          type: string
          description: |
            ECDSA P-256 private key in PEM format. Returned **exactly once**.
            Never stored server-side. Save immediately.
          example: "-----BEGIN OPENSSH PRIVATE KEY-----\nb3BlbnNzaC1rZXkt...\n-----END OPENSSH PRIVATE KEY-----\n"
        console_password:
          type: string
          description: |
            20-character alphanumeric console password injected via cloud-init.
            Returned **exactly once**. Never stored server-side.
          example: aB3xZ8mPqW5rT2nK9cFv
        note:
          type: string
          description: Human-readable polling instruction
          example: "VM is being provisioned. Poll GET /v1/virtual-machines/3a1c2e5d-1234-5678-abcd-000000000001 for status."

    # ── Bastions (F10) ─────────────────────────────────────────────────────────

    CreateBastionRequest:
      type: object
      required: [name, vnet_id, subnet_id]
      properties:
        name:
          type: string
          description: Unique bastion name within the tenant (max 63 chars)
          example: prod-bastion
        vnet_id:
          type: string
          format: uuid
          description: |
            UUID of the VNet the bastion lives in. Must be `ACTIVE` and
            belong to the caller's tenant. The bastion's OVN NIC attaches
            to a subnet of this VNet.
          example: 3a1c2e5d-0000-0000-0000-000000000010
        subnet_id:
          type: string
          format: uuid
          description: |
            UUID of the Subnet within the VNet where the bastion's OVN NIC
            attaches. Must be `ACTIVE` and belong to the specified VNet.
          example: 3a1c2e5d-0000-0000-0000-000000000021
        description:
          type: string
          maxLength: 256
          description: Optional free-text description
          example: Bastion for the prod VPC — used by the ops team.

    Bastion:
      type: object
      # vnet_id/subnet_id are populated only for VPC-attached bastions.
      # Legacy bridge-mode bastions omit them.
      required: [id, name, status, tenant_id, provider_type, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: Permanent UUID assigned at creation time
          example: 3a1c2e5d-1234-5678-abcd-000000000005
        name:
          type: string
          example: prod-bastion
        status:
          $ref: "#/components/schemas/ResourceStatus"
        tenant_id:
          type: string
          example: iam-platform
        vnet_id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000010
        subnet_id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000021
        provider_type:
          type: string
          description: Backend provider name
          example: harvester
        mgmt_ip:
          type: string
          description: |
            Operator-reachable IP on the management VLAN (typically
            172.22.100.0/25). This is the SSH-in address. Populated once
            the bastion reaches `ACTIVE`.
          example: 172.22.100.42
        internal_ip:
          type: string
          description: |
            VPC-side IP on the tenant subnet. Used as the ProxyJump origin
            and for visibility. Populated once the bastion reaches `ACTIVE`.
          example: 10.10.1.5
        description:
          type: string
        message:
          type: string
          description: Human-readable status detail or error message
        created_at:
          type: string
          format: date-time
          example: "2026-05-13T12:00:00Z"

    CreateBastionResponse:
      type: object
      required: [resource, private_key, console_password, note]
      properties:
        resource:
          $ref: "#/components/schemas/Bastion"
        private_key:
          type: string
          description: |
            ECDSA P-256 private key in OpenSSH format. Returned **exactly
            once**, never stored server-side. Save immediately — use this
            key for the SSH connection to the bastion's `mgmt_ip`.
          example: "-----BEGIN OPENSSH PRIVATE KEY-----\nb3BlbnNzaC1rZXkt...\n-----END OPENSSH PRIVATE KEY-----\n"
        console_password:
          type: string
          description: |
            20-character alphanumeric console password injected via cloud-init.
            Use for VNC/serial console fallback when SSH isn't available.
            Returned **exactly once**, never stored server-side.
          example: aB3xZ8mPqW5rT2nK9cFv
        note:
          type: string
          description: Human-readable polling instruction
          example: "Bastion is being provisioned. Poll GET /v1/bastions/3a1c2e5d-1234-5678-abcd-000000000005 for status."

    # ── Clusters ───────────────────────────────────────────────────────────────

    SystemPoolSpec:
      type: object
      description: |
        Specification for the system node pool, supplied at cluster create time.
        The system pool hosts the Kubernetes control-plane and etcd quorum.
        User workloads do not schedule here by default (RKE2 applies
        `node-role.kubernetes.io/control-plane:NoSchedule` and
        `node-role.kubernetes.io/etcd:NoExecute` taints automatically).

        The pool name is always `system` — it is set by the server and must
        not be provided in the request.
      required: [size, count]
      properties:
        size:
          type: string
          enum: [small, medium, large, xlarge]
          description: Instance size for each system node
          example: large
        count:
          type: integer
          enum: [1, 3, 5]
          description: |
            Number of system nodes. Must be `1`, `3`, or `5` (etcd quorum
            constraints). Use `1` for dev/test clusters; `3` or `5` for HA.
          example: 3
        disk_gb:
          type: integer
          minimum: 40
          description: |
            Optional root disk override in GiB. Defaults to the size default
            (40 GiB for `small`/`medium`, 80 GiB for `large`, 160 GiB for
            `xlarge`). Minimum 40 GiB.
          example: 80

    NodePoolTaint:
      type: object
      description: |
        A Kubernetes node taint applied to all nodes in a worker pool.
        Key must be a DNS subdomain (e.g. `nvidia.com/gpu`).
        Value is optional. Effect is required.
      required: [key, effect]
      properties:
        key:
          type: string
          pattern: '^[a-zA-Z0-9]([a-zA-Z0-9\-_.\/]{0,251}[a-zA-Z0-9])?$'
          description: Taint key (DNS subdomain, max 253 chars)
          example: nvidia.com/gpu
        value:
          type: string
          maxLength: 63
          description: Optional taint value (max 63 chars)
          example: present
        effect:
          type: string
          enum: [NoSchedule, PreferNoSchedule, NoExecute]
          description: Taint effect
          example: NoSchedule

    NodePool:
      type: object
      description: |
        Represents a node pool within a cluster. Node pools are either
        `system` (exactly one per cluster, controlplane + etcd) or `worker`
        (0..N, user workloads).

        The `role` field is server-set and readOnly — callers cannot change it.
      required: [name, role, size, count, status, created_at]
      properties:
        name:
          type: string
          pattern: '^[a-z]([-a-z0-9]{0,38}[a-z0-9])?$'
          readOnly: true
          description: |
            Pool name. DNS-label-safe, max 40 chars. The system pool is
            always named `system`. Worker pool names are user-supplied at
            creation and immutable thereafter.
          example: workers-01
        role:
          type: string
          enum: [system, worker]
          readOnly: true
          description: |
            Pool category. `system` = controlplane + etcd (exactly one per
            cluster). `worker` = user workloads (0..N per cluster). This
            field is set by the server and never accepted from the caller.
          example: worker
        size:
          type: string
          enum: [small, medium, large, xlarge]
          readOnly: true
          description: |
            Instance size. Immutable after pool creation. To change size,
            add a new pool of the desired size and delete the old one.
          example: xlarge
        count:
          type: integer
          minimum: 1
          maximum: 50
          description: |
            Current desired node count. For the `system` pool this is
            constrained to `{1, 3, 5}`; for worker pools the range is 1–50.
          example: 3
        disk_gb:
          type: integer
          minimum: 40
          readOnly: true
          description: Root disk size in GiB (set at creation, immutable)
          example: 80
        taints:
          type: array
          maxItems: 10
          items:
            $ref: "#/components/schemas/NodePoolTaint"
          description: |
            Node taints applied to all nodes in the pool. Maximum 10.
            Only present on `worker` pools; always absent on the `system`
            pool (controlled exclusively by RKE2 — not user-mutable).
        labels:
          type: object
          additionalProperties:
            type: string
          description: |
            Arbitrary key/value labels applied to all nodes in the pool as
            Kubernetes node labels. Keys and values must follow Kubernetes
            label syntax. Maximum 50 entries.
            Only user-mutable on `worker` pools; absent on the `system` pool.
          example:
            team: ml
            accelerator: nvidia-tesla-a100
        status:
          type: string
          enum: [provisioning, ready, scaling, deleting, failed]
          readOnly: true
          description: |
            Lifecycle status of the pool, derived from the Rancher machinePool
            condition. `scaling` indicates a PATCH count change is in progress.
          example: ready
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: "2026-05-23T10:00:00Z"

    CreateNodePoolRequest:
      type: object
      description: |
        Request body for `POST .../clusters/{id}/node-pools`.
        Always creates a **worker** pool — the role is set by the server and
        must not be included in the request.

        Pool name must be unique within the cluster. The name `system` is
        reserved and will be rejected with `400`.
      required: [name, size, count]
      properties:
        name:
          type: string
          pattern: '^[a-z]([-a-z0-9]{0,38}[a-z0-9])?$'
          description: |
            Pool name. DNS-label-safe, max 40 chars. Must be unique within
            the cluster. The value `system` is reserved and will be rejected.
          example: workers-01
        size:
          type: string
          enum: [small, medium, large, xlarge]
          description: Instance size for each node in the pool
          example: xlarge
        count:
          type: integer
          minimum: 1
          maximum: 50
          description: Number of nodes in the pool (1–50)
          example: 3
        disk_gb:
          type: integer
          minimum: 40
          description: |
            Optional root disk override in GiB. Defaults to the size default.
            Minimum 40 GiB.
          example: 160
        image_name:
          type: string
          description: |
            Optional Harvester VM image for nodes in this pool. Format:
            `namespace/image-name` (same as `CreateClusterRequest.image_name`).
            Omit to reuse the image already set in the cluster's system pool
            (the provider falls back to its configured default).
          example: "default/ubuntu-22.04-rke2-v1.33"
        taints:
          type: array
          maxItems: 10
          items:
            $ref: "#/components/schemas/NodePoolTaint"
          description: Optional node taints (max 10)
        labels:
          type: object
          additionalProperties:
            type: string
          description: Optional node labels (max 50 entries)
          example:
            team: ml

    PatchNodePoolRequest:
      type: object
      description: |
        Request body for `PATCH .../clusters/{id}/node-pools/{pool_name}`.
        All fields are optional; omit a field to leave it unchanged.

        **Mutable fields**:
        - `count` — scale the pool. For the `system` pool, only growth in
          steps `{1→3, 3→5}` is permitted; shrinks return `400`. Worker
          pools accept any value 1–50.
        - `taints` — replaces the entire taint array. Send `[]` to clear.
          Refused on the `system` pool.
        - `labels` — replaces the entire label map. Send `{}` to clear.
          Refused on the `system` pool.

        The fields `name`, `role`, and `size` are immutable and must not be
        sent. The handler returns `400` with a descriptive error if they are
        present (even though they are not in this schema, a strict decoder
        or explicit handler check catches them).
      properties:
        count:
          type: integer
          minimum: 1
          maximum: 50
          description: |
            New desired node count. System pool: must be `3` when current
            is `1`, or `5` when current is `3`; no other values accepted.
            Worker pools: any value 1–50.
          example: 5
        taints:
          type: array
          maxItems: 10
          items:
            $ref: "#/components/schemas/NodePoolTaint"
          description: |
            Replacement taint list. Replaces the existing list in full.
            Send `[]` to remove all taints. Refused on the `system` pool.
        labels:
          type: object
          additionalProperties:
            type: string
          description: |
            Replacement label map. Replaces the existing map in full.
            Send `{}` to remove all labels. Refused on the `system` pool.
          example:
            team: ml
            accelerator: nvidia-tesla-a100

    CreateClusterRequest:
      type: object
      required: [name, k8s_version, image_name, system_pool]
      description: |
        Network attachment is mutually exclusive:
        - **Legacy bridge path**: set `network_name` only.
        - **VPC path (F32)**:    set `vnet_id` + `subnet_id` only.

        Providing both or neither returns `400`.

        Worker node pools are **optional** at create time: supply `worker_pools`
        to provision one or more worker pools alongside the cluster in a single
        request. Each entry follows the `CreateNodePoolRequest` shape (the role
        is always `worker` and must not be included). Pool names must be unique
        within the cluster and must not be `system` (reserved). Worker pools can
        also be added after cluster creation via `POST .../clusters/{id}/node-pools`.
      properties:
        name:
          type: string
          pattern: '^[a-z]([-a-z0-9]{0,30}[a-z0-9])?$'
          description: |
            Unique cluster name within the project. DNS-label-safe, max 32
            chars (leaves room for `<cluster>-<pool>-<suffix>` Rancher CRD
            naming).
          example: prod-k8s-01
        k8s_version:
          type: string
          description: RKE2 Kubernetes version string
          example: v1.33.10+rke2r3
        image_name:
          type: string
          description: Image ID from `GET /v1/images`
          example: default/image-rflb5
        system_pool:
          $ref: "#/components/schemas/SystemPoolSpec"
        worker_pools:
          type: array
          maxItems: 10
          description: |
            Optional list of worker pools to provision alongside the cluster.
            Each entry follows the `CreateNodePoolRequest` shape (the role is
            always `worker` and must not be included). Pool names must be unique
            within the cluster and must not be `system` (reserved). Worker pools
            can also be added after cluster creation via
            `POST .../clusters/{id}/node-pools`.
          items:
            $ref: "#/components/schemas/CreateNodePoolRequest"
        network_name:
          type: string
          description: |
            Network ID from `GET /v1/networks`. Legacy bridge path.
            Mutually exclusive with `vnet_id` + `subnet_id`.
          example: default/vm-net-100
        vnet_id:
          type: string
          format: uuid
          description: |
            UUID of an ACTIVE VNet in this tenant. VPC path (F32).
            Mutually exclusive with `network_name`. Requires `subnet_id`.
          example: 3a1c2e5d-1234-5678-abcd-000000000001
        subnet_id:
          type: string
          format: uuid
          description: |
            UUID of an ACTIVE Subnet inside the specified `vnet_id`.
            Required when `vnet_id` is set. Mutually exclusive with `network_name`.
          example: 3a1c2e5d-1234-5678-abcd-000000000002

    Cluster:
      type: object
      required: [id, name, status, tenant_id, provider_type, created_at, system_pool, worker_pool_count, total_node_count]
      properties:
        id:
          type: string
          format: uuid
          example: 3a1c2e5d-1234-5678-abcd-000000000002
        name:
          type: string
          example: prod-k8s-01
        status:
          $ref: "#/components/schemas/ResourceStatus"
        tenant_id:
          type: string
          example: iam-platform
        provider_type:
          type: string
          example: rancher
        system_pool:
          allOf:
            - $ref: "#/components/schemas/NodePool"
          description: |
            Embedded system node pool. Always present. For the list endpoint
            this provides a quick at-a-glance view; for full node-pool detail
            call `GET .../clusters/{id}/node-pools`.
        worker_pool_count:
          type: integer
          minimum: 0
          description: |
            Number of worker pools currently attached to this cluster. Does
            not include the system pool. Fetch the full list via
            `GET .../clusters/{id}/node-pools`.
          example: 2
        total_node_count:
          type: integer
          minimum: 1
          description: |
            Sum of node counts across all pools (system + all worker pools).
            Useful for at-a-glance capacity display.
          example: 8
        message:
          type: string
          description: |
            Human-readable status detail. Semantics depend on `status`:

            - **PENDING**: progress hint sourced from the latest informative
              non-True condition on the upstream provisioning CR
              (`provisioning.cattle.io/cluster`). Examples:
              `"waiting for viable init node"`, `"configuring control plane"`.
              The reconciler refreshes this every poll cycle without flipping
              status, so callers polling GET see progress without a state change.
            - **FAILED**: terminal failure reason from the upstream Stalled
              condition (e.g. `"control plane never became healthy"`).
            - **ACTIVE**: typically empty.
          example: waiting for viable init node
        created_at:
          type: string
          format: date-time
          example: "2026-05-23T10:00:00Z"

    CreateClusterResponse:
      type: object
      required: [resource, note]
      properties:
        resource:
          $ref: "#/components/schemas/Cluster"
        note:
          type: string
          example: "Cluster is being provisioned. Poll GET .../clusters/3a1c2e5d-1234-5678-abcd-000000000002 for status."

    # ── RBAC ───────────────────────────────────────────────────────────────────

    RoleAssignment:
      type: object
      required: [id, principal_type, principal_id, scope_type, scope_id, role, granted_at, granted_by]
      properties:
        id:
          type: string
          format: uuid
          description: UUID of the role_assignments row
          example: 3a1c2e5d-0000-0000-0000-000000000001
        principal_type:
          type: string
          enum: [user, service_account]
          example: user
        principal_id:
          type: string
          description: OIDC `sub` for users; service account UUID for SAs
          example: 01abc123-0000-0000-0000-user000000001
        scope_type:
          type: string
          enum: [tenant]
          description: Scope hierarchy level. Only `tenant` is active in M1.5.
          example: tenant
        scope_id:
          type: string
          description: Identifier of the scope (e.g. tenant slug)
          example: iam-platform
        role:
          type: string
          enum: [owner, member, viewer]
          example: member
        granted_at:
          type: string
          format: date-time
          example: "2026-05-09T10:00:00Z"
        granted_by:
          type: string
          description: |
            principal_id of the granter. Special prefixes mark
            non-human sources: `autoprovision-from-asgardeo-group`
            (legacy autoprovision path, default off in Option D),
            `member-invite:<inviter-sub>` (when the row was created
            implicitly by an admin invite), or a bare sub when
            granted explicitly via the members API.
          example: 01abc123-0000-0000-0000-user000000099
        display_alias:
          type: string
          description: |
            Admin-set mnemonic shown by cloud-ui instead of the opaque
            `principal_id`. Optional. No PII is sourced from the IdP —
            purely what the inviter typed when they added the principal.
          example: alice-laptop

    InviteMemberRequest:
      type: object
      required: [user_sub, role]
      properties:
        user_sub:
          type: string
          description: OIDC `sub` of the user to invite
          example: 01abc123-0000-0000-0000-user000000001
        role:
          type: string
          enum: [owner, member, viewer]
          example: member
        display_alias:
          type: string
          description: |
            Optional mnemonic the inviter sets so cloud-ui can show a
            readable name in the members list instead of the opaque
            `user_sub`. Not propagated to the IdP and never matched
            against any IdP attribute — purely admin bookkeeping.
            Stored verbatim, max 256 chars by convention.
          example: alice-laptop

    # ── Service Accounts ───────────────────────────────────────────────────────

    CreateServiceAccountRequest:
      type: object
      required: [name, role]
      properties:
        name:
          type: string
          description: |
            Unique name within the tenant. Must match `[a-z0-9][a-z0-9-]{0,61}[a-z0-9]`
            (lowercase, alphanumeric, hyphens only).
          example: ci-deploy
        role:
          type: string
          enum: [owner, member, viewer]
          example: member
        description:
          type: string
          maxLength: 256
          description: Optional free-text description (max 256 chars)
          example: GitHub Actions deploy pipeline

    ServiceAccount:
      type: object
      required: [id, tenant_id, name, role, created_at]
      properties:
        id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000099
        tenant_id:
          type: string
          example: iam-platform
        name:
          type: string
          example: ci-deploy
        role:
          type: string
          enum: [owner, member, viewer]
          example: member
        description:
          type: string
          example: GitHub Actions deploy pipeline
        created_at:
          type: string
          format: date-time
          example: "2026-05-09T10:00:00Z"
        last_used:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent authenticated request. Null until first use.
          example: "2026-05-09T12:00:00Z"

    CreateServiceAccountResponse:
      type: object
      required: [id, tenant_id, name, role, created_at, token]
      properties:
        id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000099
        tenant_id:
          type: string
          example: iam-platform
        name:
          type: string
          example: ci-deploy
        role:
          type: string
          enum: [owner, member, viewer]
          example: member
        description:
          type: string
          example: GitHub Actions deploy pipeline
        created_at:
          type: string
          format: date-time
          example: "2026-05-09T10:00:00Z"
        token:
          type: string
          description: |
            Raw service-account token in the format `dcapi_sa_<lookup_id>_<secret>`.
            Shown **exactly once**. Store immediately — cannot be retrieved again.
          example: dcapi_sa_a1b2c3d4e5f6_0102030405060708090a0b0c0d0e0f10

    # ── Tenants ────────────────────────────────────────────────────────────────

    TenantSummary:
      type: object
      required: [id, name, roles]
      description: |
        A tenant the authenticated principal has access to, along with
        the union of roles the principal holds across all scopes within
        that tenant.
      properties:
        id:
          type: string
          description: Tenant slug identifier
          example: iam-platform
        name:
          type: string
          description: Display name (same as id in M1.5 — separate name field is M5)
          example: iam-platform
        roles:
          type: array
          items:
            type: string
            enum: [owner, member, viewer]
          description: |
            Union of distinct roles the principal holds across all scopes
            within this tenant. Used by the UI to decide which actions to enable.
          example:
            - owner

    Tenant:
      type: object
      required: [id, name, created_at]
      description: |
        Full tenant record from the `tenants` registry. Returned by the
        admin endpoints (`POST /v1/admin/tenants`, `GET /v1/tenants` admin
        path). Distinct from `TenantSummary` (which is per-principal and
        carries `roles`); `Tenant` is the canonical record without a
        principal context.
      properties:
        id:
          type: string
          description: Tenant slug identifier. Matches the Asgardeo group suffix after `DCAPI_TENANT_GROUP_PREFIX`.
          example: cs-team
        name:
          type: string
          description: Human-readable display name. Defaults to `id` when not set explicitly.
          example: Customer Success
        asgardeo_group:
          type: string
          description: |
            Full Asgardeo group name backing this tenant (e.g. `dc-tenant-cs-team`).
            Populated automatically by autoprovision and by admin registration.
          example: dc-tenant-cs-team
        description:
          type: string
          description: Optional free-form description set by the admin who registered the tenant.
        created_at:
          type: string
          format: date-time
          description: When this tenant record was first inserted into the `tenants` table.
        created_by:
          type: string
          description: |
            Audit field — `autoprovision` when the row was created by the auth
            middleware on first sighting of a `dc-tenant-*` group claim, or
            the Asgardeo `sub` of the platform admin who called
            `POST /v1/admin/tenants` explicitly.
          example: autoprovision
        cpu_cores_cap:
          type: integer
          minimum: 1
          description: |
            Tenant capacity ceiling for CPU cores. Set by platform admin at
            tenant create (or via PATCH `/v1/admin/tenants/{tenant_id}`).
            Tenant owners distribute this budget across projects via the
            per-project `cpu_cores` field — sum of project allocations must
            stay ≤ this cap.
          example: 80
        memory_gb_cap:
          type: integer
          minimum: 1
          description: Tenant capacity ceiling for memory (GB). Same model as `cpu_cores_cap`.
          example: 256
        storage_gb_cap:
          type: integer
          minimum: 1
          description: Tenant capacity ceiling for storage (GB). Same model as `cpu_cores_cap`.
          example: 2000

    TenantCap:
      type: object
      required: [cpu_cores, memory_gb, storage_gb]
      description: |
        A capacity triplet — used in `QuotaExceededError` bodies for
        the `tenant_cap`, `allocated`, `available`, and `requested` fields.
      properties:
        cpu_cores:
          type: integer
          example: 80
        memory_gb:
          type: integer
          example: 256
        storage_gb:
          type: integer
          example: 2000

    QuotaExceededError:
      type: object
      required: [error, message, requested]
      description: |
        Returned with HTTP 400 when a project create or quota PATCH would
        breach the tenant cap (or shrink a tenant cap below already-allocated
        project sums). The body fields let the caller render an actionable
        error: "you asked for X, but you have Y available."
      properties:
        error:
          type: string
          enum: [quota_exceeded]
        message:
          type: string
          example: "project quotas would exceed tenant cap"
        tenant_cap:
          $ref: "#/components/schemas/TenantCap"
        allocated:
          $ref: "#/components/schemas/TenantCap"
        available:
          $ref: "#/components/schemas/TenantCap"
        requested:
          $ref: "#/components/schemas/TenantCap"

    CreateTenantRequest:
      type: object
      required: [id]
      description: |
        Body for `POST /v1/admin/tenants`. Registers a tenant in the
        local `tenants` table so admins can discover it via
        `GET /v1/tenants` even before any user with that group has
        logged in. Does NOT create the Asgardeo group itself — that step
        is operator-owned in M1.5; Phase 2 (Asgardeo Admin API integration)
        will close that loop.
      properties:
        id:
          type: string
          description: |
            Tenant slug. Must match `^[a-z][a-z0-9-]{0,30}[a-z0-9]$`.
            Will be combined with `DCAPI_TENANT_GROUP_PREFIX` to derive
            the Asgardeo group name (e.g. id=`cs-team` → group `dc-tenant-cs-team`).
          example: cs-team
        name:
          type: string
          description: Optional display name; defaults to `id` when omitted.
          example: Customer Success
        description:
          type: string
          description: Optional free-form description.
        cpu_cores_cap:
          type: integer
          minimum: 0
          description: |
            Optional CPU cap. Omit or pass 0 to accept the schema default
            (80). Bumpable later via PATCH `/v1/admin/tenants/{tenant_id}`.
          example: 80
        memory_gb_cap:
          type: integer
          minimum: 0
          description: Optional memory cap (GB). 0 = default (256).
          example: 256
        storage_gb_cap:
          type: integer
          minimum: 0
          description: Optional storage cap (GB). 0 = default (2000).
          example: 2000

    UpdateTenantCapRequest:
      type: object
      description: |
        Body for `PATCH /v1/admin/tenants/{tenant_id}`. Any subset of
        cap fields may be provided; omitted fields keep their current
        value. Each provided value must be ≥ 1 (no freezing via PATCH;
        delete the tenant if you want that).

        Refused with 400 + `QuotaExceededError` body when the new cap
        would shrink any dimension below the already-allocated sum of
        project quotas in this tenant.
      properties:
        cpu_cores_cap:
          type: integer
          minimum: 1
          example: 120
        memory_gb_cap:
          type: integer
          minimum: 1
          example: 384
        storage_gb_cap:
          type: integer
          minimum: 1
          example: 3000

    UpdateProjectQuotaRequest:
      type: object
      description: |
        Body for `PATCH /v1/tenants/{tenant_id}/projects/{project_id}`.
        Any subset of quota fields; omitted fields keep current value.

        Two failure modes (both 400):
        - `quota_below_usage` — new quota is lower than what's currently
          in use by active resources in this project. Body includes
          `requested` and `in_use`.
        - `quota_exceeded` — new quota plus other projects' allocations
          would exceed the tenant cap. Body is `QuotaExceededError`.
      properties:
        cpu_cores:
          type: integer
          minimum: 1
          example: 20
        memory_gb:
          type: integer
          minimum: 1
          example: 64
        storage_gb:
          type: integer
          minimum: 1
          example: 500

    # ── Auth BFF ───────────────────────────────────────────────────────────────

    AuthMe:
      type: object
      required: [sub, expires_at]
      description: |
        Identity payload returned by `GET /v1/auth/me`. Fields are sourced
        from the claims cached in the encrypted `dcapi_session` cookie at
        login time — no live token verification occurs at this endpoint.
      properties:
        sub:
          type: string
          description: |
            OIDC subject identifier — the IdP's stable, opaque user ID.
            Matches the `sub` claim in the Asgardeo ID token.
          example: "01abc123-0000-0000-0000-user000000001"
        email:
          type: string
          description: |
            Email address from the `email` claim in the ID token.
            May be an empty string if Asgardeo did not include the claim
            (depends on the application's requested scopes).
          example: "alice@example.com"
        expires_at:
          type: string
          format: date-time
          description: |
            RFC3339 timestamp when the access token (and therefore the
            session) expires. cloud-ui can use this to show a "session
            expiring soon" banner and proactively redirect to
            `GET /v1/auth/login` before the token is rejected by the
            auth middleware.
          example: "2026-05-16T12:00:00Z"
        is_admin:
          type: boolean
          description: |
            `true` when the signed-in user is a platform admin. Two
            sources promote (either suffices):

            1. The user's `sub` is in the comma-separated
               `DCAPI_PLATFORM_ADMIN_SUBS` env var (Option D preferred
               path — decouples admin status from the IdP).
            2. The user holds the Asgardeo group named by
               `DCAPI_ADMIN_GROUP` (default `dc-admin`; legacy fallback).

            Derived at login time and cached in the session cookie — no
            live IdP lookup. Platform admins bypass per-tenant RBAC
            checks and see every tenant via `GET /v1/tenants`.
          default: false
          example: true
        tenants:
          type: array
          items:
            type: string
          description: |
            Tenant identifiers the user has access to according to the
            ID token's `groups` claim (strips the `DCAPI_TENANT_GROUP_PREFIX`
            from each `dc-tenant-*` group). Cached at login time.
            For admins this list is informational only — admins access
            every tenant regardless of group membership; use
            `GET /v1/tenants` to enumerate the actual visible set.
          example: ["test", "cs-team", "hiran"]

    # ── Networking ─────────────────────────────────────────────────────────────

    CreateVNetRequest:
      type: object
      required: [name, address_space, region]
      properties:
        name:
          type: string
          description: |
            Unique within the tenant. Matches `[a-z][a-z0-9-]{0,61}[a-z0-9]`.
          example: prod-vnet
        address_space:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 5
          description: One or more RFC1918 CIDRs (/8–/28). Max 5 in M2.
          example:
            - 10.10.0.0/16
        region:
          type: string
          description: Region slug. Must exist in the DC-API regions table.
          example: lk-dev
        description:
          type: string
          maxLength: 256
          example: Production VNet

    VNet:
      type: object
      required: [id, tenant_id, name, region, address_space, status, provider_type, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000010
        tenant_id:
          type: string
          example: iam-platform
        name:
          type: string
          example: prod-vnet
        region:
          type: string
          example: lk-dev
        address_space:
          type: array
          items:
            type: string
          example:
            - 10.10.0.0/16
        description:
          type: string
          example: Production VNet
        status:
          $ref: "#/components/schemas/ResourceStatus"
        provider_type:
          type: string
          example: kubeovn
        message:
          type: string
          description: Human-readable status detail or error message
        created_at:
          type: string
          format: date-time
          example: "2026-05-09T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-05-09T10:01:00Z"

    CreateSubnetRequest:
      type: object
      required: [name, cidr]
      properties:
        name:
          type: string
          description: Unique within the VNet
          example: app-subnet
        cidr:
          type: string
          description: IPv4 CIDR within the parent VNet's address_space (/8–/28)
          example: 10.10.1.0/24
        gateway:
          type: string
          description: |
            Optional gateway IP. Must be within the CIDR.
            Defaults to the first usable IP in the CIDR if omitted.
          example: 10.10.1.1
        description:
          type: string
          maxLength: 256
          example: Application tier

    Subnet:
      type: object
      required: [id, vnet_id, tenant_id, name, cidr, status, provider_type, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000021
        vnet_id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000010
        tenant_id:
          type: string
          example: iam-platform
        name:
          type: string
          example: app-subnet
        cidr:
          type: string
          example: 10.10.1.0/24
        gateway:
          type: string
          example: 10.10.1.1
        description:
          type: string
        status:
          $ref: "#/components/schemas/ResourceStatus"
        provider_type:
          type: string
          example: kubeovn
        message:
          type: string
        created_at:
          type: string
          format: date-time
          example: "2026-05-09T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-05-09T10:01:00Z"

    RouteRule:
      type: object
      required: [name, destination_cidr, next_hop_type]
      properties:
        name:
          type: string
          description: Unique within the route table
          example: internet-egress
        destination_cidr:
          type: string
          description: Destination CIDR or `0.0.0.0/0`
          example: "0.0.0.0/0"
        next_hop_type:
          type: string
          enum: [vnet_local, internet, virtual_appliance, none]
          example: internet
        next_hop_ip:
          type: string
          description: |
            Required when `next_hop_type` is `virtual_appliance`.
            Must be a valid IP within a subnet of the parent VNet.
          example: 10.10.1.254

    CreateRouteTableRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Unique within the VNet
          example: rt-default
        description:
          type: string
          maxLength: 256
        routes:
          type: array
          items:
            $ref: "#/components/schemas/RouteRule"
          description: Initial route set. May be empty.
          default: []

    RouteTable:
      type: object
      required: [id, vnet_id, tenant_id, name, routes, status, provider_type, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000031
        vnet_id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000010
        tenant_id:
          type: string
          example: iam-platform
        name:
          type: string
          example: rt-default
        description:
          type: string
        routes:
          type: array
          items:
            $ref: "#/components/schemas/RouteRule"
        status:
          $ref: "#/components/schemas/ResourceStatus"
        provider_type:
          type: string
          example: kubeovn
        created_at:
          type: string
          format: date-time
          example: "2026-05-09T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-05-09T10:01:00Z"

    RouteTableAssociation:
      type: object
      required: [id, route_table_id, subnet_id, created_at]
      properties:
        id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000041
        route_table_id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000031
        subnet_id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000021
        created_at:
          type: string
          format: date-time
          example: "2026-05-09T10:00:00Z"
        warning:
          type: string
          description: |
            Present when per-subnet routing is not yet enforced at the data plane
            (M2 — all routes apply at VPC level).
          example: "per-subnet route differentiation is informational in M2 — all routes apply at the VPC level. Slated for M2.5 (OVN policy routes)."

    CreatePeeringRequest:
      type: object
      required: [name, peer_vnet_id]
      properties:
        name:
          type: string
          description: Unique within the requesting VNet
          example: prod-to-dev
        peer_vnet_id:
          type: string
          format: uuid
          description: |
            UUID of the target VNet. Must belong to the same tenant.
            Cross-tenant peering is not supported (returns 404).
          example: 3a1c2e5d-0000-0000-0000-000000000011
        allow_forwarded_traffic:
          type: boolean
          default: false
          description: |
            Stored but not enforced in M2. When true, the response includes
            a `warning` field.

    Peering:
      type: object
      required: [id, vnet_id, peer_vnet_id, tenant_id, name, allow_forwarded_traffic, status, provider_type, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000051
        vnet_id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000010
        peer_vnet_id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000011
        tenant_id:
          type: string
          example: iam-platform
        name:
          type: string
          example: prod-to-dev
        allow_forwarded_traffic:
          type: boolean
          example: false
        status:
          $ref: "#/components/schemas/ResourceStatus"
        provider_type:
          type: string
          example: kubeovn
        message:
          type: string
        created_at:
          type: string
          format: date-time
          example: "2026-05-09T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-05-09T10:01:00Z"
        warning:
          type: string
          description: |
            Present when `allow_forwarded_traffic` is true (no-op in M2).
          example: "allow_forwarded_traffic is accepted but not yet enforced — slated for M2.5"

    NSGRule:
      type: object
      required: [name, direction, priority, protocol, source_address_prefix, source_port_range, destination_address_prefix, destination_port_range, action]
      properties:
        name:
          type: string
          description: Unique within the NSG
          example: allow-https
        direction:
          type: string
          enum: [inbound, outbound]
          example: inbound
        priority:
          type: integer
          minimum: 100
          maximum: 4096
          description: Lower values have higher precedence. Must be unique per direction per NSG.
          example: 100
        protocol:
          type: string
          enum: [tcp, udp, icmp, "*"]
          example: tcp
        source_address_prefix:
          type: string
          description: Source CIDR, `*`, or `VnetLocal`
          example: "*"
        source_port_range:
          type: string
          description: Port number, `*`, or range (e.g. `1024-65535`)
          example: "*"
        destination_address_prefix:
          type: string
          description: Destination CIDR, `*`, or `VnetLocal`
          example: "*"
        destination_port_range:
          type: string
          description: Port number, `*`, or range
          example: "443"
        action:
          type: string
          enum: [allow, deny]
          example: allow

    CreateNSGRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Unique within the tenant
          example: web-sg
        description:
          type: string
          maxLength: 256
        rules:
          type: array
          items:
            $ref: "#/components/schemas/NSGRule"
          description: Initial rule set. May be empty.
          default: []

    NSGAttachment:
      type: object
      required: [id, sg_id, target_type, target_id, created_at]
      properties:
        id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000071
        sg_id:
          type: string
          format: uuid
          description: UUID of the parent NSG
          example: 3a1c2e5d-0000-0000-0000-000000000061
        target_type:
          type: string
          enum: [subnet, nic]
          description: In M2 only `subnet` is supported. `nic` returns 400.
          example: subnet
        target_id:
          type: string
          format: uuid
          description: UUID of the attached subnet (or NIC in M3)
          example: 3a1c2e5d-0000-0000-0000-000000000021
        created_at:
          type: string
          format: date-time
          example: "2026-05-09T10:00:00Z"

    AttachNSGRequest:
      type: object
      required: [target_type, target_id]
      properties:
        target_type:
          type: string
          enum: [subnet]
          description: |
            In M2 only `subnet` is accepted. Providing `nic` returns HTTP 400.
          example: subnet
        target_id:
          type: string
          format: uuid
          description: UUID of the subnet to attach the NSG to
          example: 3a1c2e5d-0000-0000-0000-000000000021

    NSG:
      type: object
      required: [id, tenant_id, name, rules, attachments, status, provider_type, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000061
        tenant_id:
          type: string
          example: iam-platform
        name:
          type: string
          example: web-sg
        description:
          type: string
        rules:
          type: array
          items:
            $ref: "#/components/schemas/NSGRule"
          description: Complete rule set. Empty array means no rules.
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/NSGAttachment"
          description: Current subnet attachments.
        status:
          $ref: "#/components/schemas/ResourceStatus"
        provider_type:
          type: string
          example: kubeovn
        created_at:
          type: string
          format: date-time
          example: "2026-05-09T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-05-09T10:01:00Z"

    CreateKeyVaultRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: |
            Vault name. Must be a valid DNS label (lowercase alphanumerics and
            hyphens, 3..63 chars, starts with a letter). Uniqueness enforced
            per tenant.
          example: billing-secrets
        soft_delete_days:
          type: integer
          minimum: 7
          maximum: 90
          default: 30
          description: |
            Recovery window for soft-deleted secrets, in days. Range 7..90;
            omit or set to `0` to use the default of `30`. Chunk 1 stores
            the value but does not yet act on it — chunk 3 (secret delete /
            recovery) will enforce the window.
          example: 30

    KeyVault:
      type: object
      required: [id, tenant_id, name, soft_delete_days, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          example: 6f1c4d2a-0000-0000-0000-000000000071
        tenant_id:
          type: string
          example: iam-platform
        name:
          type: string
          example: billing-secrets
        soft_delete_days:
          type: integer
          example: 30
        status:
          $ref: "#/components/schemas/ResourceStatus"
        message:
          type: string
        mount_path:
          type: string
          description: |
            KV-v2 mount path the user reads/writes secrets under (e.g.
            `tenants/<tenant-uuid>/<resource-uuid>`). Populated only when
            KVI is wired AND status=ACTIVE.
        endpoint_address:
          type: string
          description: |
            In-cluster address of the OpenBao Service the proxy forwards to
            (e.g. `kvb-acme-active.dc-tenant-acme.svc.cluster.local`).
            Populated only when KVI is wired AND status=ACTIVE.
        endpoint_port:
          type: integer
          description: OpenBao API port (typically 8200).
        created_at:
          type: string
          format: date-time
          example: "2026-05-14T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-05-14T10:00:00Z"

    KeyVaultCredentials:
      type: object
      description: |
        AppRole credentials shown exactly once by GET .../credentials.
        Subsequent calls return 410 Gone.
      required: [role_id, secret_id, mount_path, backend_address, backend_port]
      properties:
        role_id:
          type: string
          description: AppRole role_id (stable across reads).
          example: 5ba13153-fb83-1ac9-094d-3988749dc091
        secret_id:
          type: string
          description: AppRole secret_id minted at vault-create time.
          example: 47a32c45-0b23-c65e-cbd3-4f404fbc5a81
        mount_path:
          type: string
          description: KV-v2 mount path the AppRole has scoped CRUD on.
          example: tenants/11111111-2222-3333-4444-555555555555/99999999-8888-7777-6666-555555555555
        backend_address:
          type: string
          description: |
            In-cluster address of the per-tenant OpenBao cluster. Reach it
            from a tenant VM via a PrivateEndpoint, or directly from
            in-cluster workloads.
          example: kvb-acme-active.dc-tenant-acme.svc.cluster.local
        backend_port:
          type: string
          description: OpenBao API port as a string (typically "8200").
          example: "8200"

    KeyVaultSecretCreateRequest:
      type: object
      required: [value]
      description: Request body for PUT .../secrets/{key}
      properties:
        value:
          type: string
          description: |
            Opaque secret value. Treated as an arbitrary UTF-8 string by dc-api.
            Maximum 1 MiB (OpenBao's default per-secret cap). dc-api returns 400
            if the encoded value exceeds this limit.
          example: "s3cr3t-hunter2"
        metadata:
          type: object
          description: |
            Arbitrary string→string metadata stored alongside the value in
            KV-v2's secret metadata. Keys and values are passed through to
            OpenBao verbatim. Maximum 64 pairs per secret (OpenBao limit).
          additionalProperties:
            type: string
          example:
            owner: billing-team
            rotated_by: ci-pipeline

    KeyVaultSecret:
      type: object
      required: [key, value, version, created_at]
      description: |
        A single secret value retrieved from the vault's KV-v2 mount.
        Contains the plaintext value and version metadata for the requested
        (or latest) version.
      properties:
        key:
          type: string
          description: Secret key name.
          example: db-password
        value:
          type: string
          description: Plaintext secret value for the requested version.
          example: "s3cr3t-hunter2"
        version:
          type: integer
          description: |
            KV-v2 version number. Monotonically increasing per key; starts at
            1 on first PUT, increments on each subsequent PUT.
          example: 4
        metadata:
          type: object
          description: |
            String→string metadata stored alongside this version, if any.
          additionalProperties:
            type: string
          example:
            owner: billing-team
            rotated_by: ci-pipeline
        created_at:
          type: string
          format: date-time
          description: Timestamp at which this specific version was written.
          example: "2026-05-20T12:00:00Z"
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Set when this version has been soft-deleted. Null for live versions.
            The version and its value remain readable by explicit `?version=N`
            until the parent vault's `soft_delete_days` window elapses.
          example: "2026-05-21T09:00:00Z"

    KeyVaultSecretSummary:
      type: object
      required: [name, latest_version, created_at, updated_at]
      description: |
        Condensed view of a secret returned by the list endpoint. The plaintext
        value is never included — use GET .../secrets/{key} to reveal it.
      properties:
        name:
          type: string
          description: Secret key name.
          example: db-password
        latest_version:
          type: integer
          description: Version number of the most recent write.
          example: 4
        created_at:
          type: string
          format: date-time
          description: Timestamp of the first version (key creation time).
          example: "2026-05-18T08:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: Timestamp of the latest version write.
          example: "2026-05-20T12:00:00Z"
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Set when the latest version has been soft-deleted. Null for live
            secrets. Soft-deleted secrets remain in the list until the parent
            vault's `soft_delete_days` window elapses and KV-v2 purges them.
          example: "2026-05-21T09:00:00Z"

    KeyVaultSecretListResponse:
      type: object
      required: [items]
      description: |
        Cursor-paginated list of secret name summaries. Values are never
        included in list responses.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/KeyVaultSecretSummary"
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor for the next page. Pass as `?cursor=<value>` on the
            next request. Null or absent when this is the last page.
          example: "dGVzdC1rZXk="
        total_count:
          type: integer
          description: |
            Total number of secrets in the vault (including soft-deleted ones
            still within the purge window). Provided as a convenience for UI
            pagination; not guaranteed to be exact under high write concurrency.
          example: 42

    CreatePrivateEndpointRequest:
      type: object
      required: [name, vnet_id, subnet_id]
      properties:
        name:
          type: string
          description: |
            Endpoint name. Also used as the hostname prefix in the per-VPC DNS
            record (e.g. `<name>.kv.dc.internal`). Lowercase DNS label,
            3..63 chars, starts with a letter.
          example: billing-vault
        vnet_id:
          type: string
          format: uuid
          description: VPC to attach the endpoint to
        subnet_id:
          type: string
          format: uuid
          description: Subnet within the VNet to allocate the VIP from

    PrivateEndpoint:
      type: object
      required: [id, tenant_id, target_type, target_id, vnet_id, subnet_id, name, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
        target_type:
          type: string
          description: |
            What kind of managed service this endpoint fronts. Today only
            `key_vault`; later values include `database`, `cache`, `registry`.
          example: key_vault
        target_id:
          type: string
          format: uuid
          description: UUID of the target resource (Key Vault, Database, …)
        vnet_id:
          type: string
          format: uuid
        subnet_id:
          type: string
          format: uuid
        name:
          type: string
        ip_address:
          type: string
          description: VIP allocated from the tenant subnet's CIDR
          example: 10.20.0.50
        hostname:
          type: string
          description: |
            DNS name resolvable only from inside the tenant's VPC. Resolves
            to ip_address via the per-VPC CoreDNS pod.
          example: billing-vault.kv.dc.internal
        status:
          $ref: "#/components/schemas/ResourceStatus"
        message:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateDNSZoneRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: |
            DNS zone name. Must be a valid DNS label sequence
            (e.g. `internal.lk.wso2.com`). Uniqueness enforced per (vnet_id, name).
          example: internal.lk.wso2.com
        description:
          type: string
          maxLength: 256

    DNSZone:
      type: object
      required: [id, vnet_id, tenant_id, name, status, provider_type, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000081
        vnet_id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000010
        tenant_id:
          type: string
          example: iam-platform
        name:
          type: string
          description: DNS zone name
          example: internal.lk.wso2.com
        description:
          type: string
        status:
          $ref: "#/components/schemas/ResourceStatus"
        provider_type:
          type: string
          example: kubeovn
        message:
          type: string
        created_at:
          type: string
          format: date-time
          example: "2026-05-09T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-05-09T10:01:00Z"

    CreateDNSRecordRequest:
      type: object
      required: [name, type, values]
      properties:
        name:
          type: string
          description: Relative record name within the zone (e.g. `api`)
          example: api
        type:
          type: string
          enum: [A, AAAA, CNAME, SRV, TXT, MX]
          example: A
        values:
          type: array
          items:
            type: string
          minItems: 1
          description: One or more record values
          example:
            - 10.10.1.50
        ttl:
          type: integer
          minimum: 30
          maximum: 86400
          description: TTL in seconds. Defaults to 300 if omitted.
          example: 60

    DNSRecord:
      type: object
      required: [id, zone_id, tenant_id, type, name, values, ttl, created_at]
      properties:
        id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000091
        zone_id:
          type: string
          format: uuid
          example: 3a1c2e5d-0000-0000-0000-000000000081
        tenant_id:
          type: string
          example: iam-platform
        type:
          type: string
          enum: [A, AAAA, CNAME, SRV, TXT, MX]
          example: A
        name:
          type: string
          description: Relative name within the zone
          example: api
        values:
          type: array
          items:
            type: string
          example:
            - 10.10.1.50
        ttl:
          type: integer
          example: 60
        created_at:
          type: string
          format: date-time
          example: "2026-05-09T10:00:00Z"

    # ── Shared async envelope ──────────────────────────────────────────────────

    AsyncNetworkResponse:
      type: object
      required: [resource, note]
      description: |
        Generic 202 envelope for async network resource operations.
        `resource` is the newly created object in PENDING status.
        `note` contains the polling URL.
      properties:
        resource:
          type: object
          description: The created resource in PENDING status (schema varies by endpoint)
        note:
          type: string
          description: Human-readable polling instruction with the GET URL
          example: "VNet is being provisioned. Poll GET /v1/vnets/{id} for status."

    # ── Task 1 — DBaaS Database schemas ───────────────────────────────────────

    CreateDatabaseRequest:
      type: object
      required: [name, instance_class, allocated_storage_gb]
      description: |
        Body for `POST .../databases`. Network selection is optional —
        omit to use the project's default (first ACTIVE subnet).
      properties:
        name:
          type: string
          description: Project-unique name (DNS-label rules; ≤32 chars).
          example: orders
        engine:
          type: string
          enum: [postgres]
          default: postgres
          description: Database engine. v1 supports postgres only.
        engine_version:
          type: string
          description: |
            Engine version (e.g. "16"). Informational in v1 — accepted and
            stored but not acted on by the controller until Task 2 lands
            multi-version support.
          example: "16"
        instance_class:
          type: string
          enum:
            - db.t3.micro
            - db.t3.small
            - db.t3.medium
            - db.t3.large
            - db.t3.xlarge
            - db.t3.2xlarge
            - db.m5.large
            - db.m5.xlarge
            - db.m5.2xlarge
            - db.r5.large
            - db.r5.xlarge
            - db.r5.2xlarge
          description: RDS-style instance size class.
          example: db.t3.medium
        allocated_storage_gb:
          type: integer
          minimum: 1
          description: Data-volume size in GiB.
          example: 50
        network:
          $ref: "#/components/schemas/DatabaseNetworkSpec"

    DatabaseNetworkSpec:
      description: |
        Discriminated network selection. Omit to auto-pick the project's
        default subnet (VPC mode).
      oneOf:
        - $ref: "#/components/schemas/DatabaseNetworkVPC"
        - $ref: "#/components/schemas/DatabaseNetworkLegacy"
      discriminator:
        propertyName: mode
        mapping:
          vpc: "#/components/schemas/DatabaseNetworkVPC"
          legacy: "#/components/schemas/DatabaseNetworkLegacy"

    DatabaseNetworkVPC:
      type: object
      required: [mode, vnet_id, subnet_id]
      description: KubeOVN-managed VPC + subnet (the modern path).
      properties:
        mode:
          type: string
          enum: [vpc]
        vnet_id:
          type: string
          format: uuid
        subnet_id:
          type: string
          format: uuid

    DatabaseNetworkLegacy:
      type: object
      required: [mode, nad_ref]
      description: |
        Pre-existing Multus NAD on a VLAN bridge. Used for environments
        not yet migrated to KubeOVN (e.g. lk prod).
      properties:
        mode:
          type: string
          enum: [legacy]
        nad_ref:
          type: string
          description: "Multus NAD as 'namespace/name'."
          example: "default/vm-net-100"

    Database:
      type: object
      description: |
        A managed Database resource. Spec fields come from create-time
        input; status fields (`status`, `message`, `endpoint_address`,
        `endpoint_port`) are populated from the live DBInstance CR status
        on every GET.
      required:
        - id
        - tenant_id
        - project_id
        - name
        - engine
        - instance_class
        - allocated_storage_gb
        - network_mode
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
        project_id:
          type: string
        name:
          type: string
        engine:
          type: string
          enum: [postgres]
        engine_version:
          type: string
        instance_class:
          type: string
        allocated_storage_gb:
          type: integer
        network_mode:
          type: string
          enum: [vpc, legacy]
        vnet_id:
          type: string
          format: uuid
          description: Set only when network_mode=vpc.
        subnet_id:
          type: string
          format: uuid
          description: Set only when network_mode=vpc.
        nad_ref:
          type: string
          description: Set only when network_mode=legacy.
        status:
          type: string
          enum: [PENDING, ACTIVE, FAILED, DELETING]
        message:
          type: string
          description: Human-readable status message from the controller.
        endpoint_address:
          type: string
          description: IP or hostname clients connect to. Empty until ACTIVE.
        endpoint_port:
          type: integer
          description: TCP port. Empty until ACTIVE.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DatabaseCredentials:
      type: object
      description: |
        Master user credentials for a Database. Returned exactly once on
        the first call to `GET .../{id}/credentials`. Save them immediately;
        dc-api will never return them again.
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
        ca_cert:
          type: string
          description: |
            PEM-encoded CA certificate for SSL verification. Use with
            `sslmode=verify-ca` in psql/JDBC connection strings.

