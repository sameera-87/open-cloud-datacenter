---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dc-api-webhook
  namespace: dc-api
  labels:
    app: dc-api-webhook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dc-api-webhook
  template:
    metadata:
      labels:
        app: dc-api-webhook
    spec:
      serviceAccountName: dc-api-webhook
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webhook
          # Image is built from the same Dockerfile.webhook as dc-api.
          # The live tag is managed by Terraform in wso2-datacenter-project.
          image: ghcr.io/wso2/dc-api-webhook:latest
          imagePullPolicy: Always
          args: []
          ports:
            - containerPort: 9443
              name: https
          env:
            - name: DCWEBHOOK_LISTEN_ADDR
              value: ":9443"
            - name: DCWEBHOOK_CERT_FILE
              value: /tls/tls.crt
            - name: DCWEBHOOK_KEY_FILE
              value: /tls/tls.key
            - name: DCWEBHOOK_LOG_LEVEL
              value: info
            # DCWEBHOOK_KUBECONFIG is injected from the same Secret as dc-api.
            - name: DCWEBHOOK_KUBECONFIG
              valueFrom:
                secretKeyRef:
                  name: dc-api-secrets
                  key: DCAPI_HARVESTER_KUBECONFIG
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9443
              scheme: HTTPS
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
      volumes:
        - name: tls
          secret:
            # cert-manager (or Terraform) provisions this Secret with
            # tls.crt and tls.key.  The Secret name is configurable via TF.
            secretName: dc-api-webhook-tls
---
apiVersion: v1
kind: Service
metadata:
  name: dc-api-webhook
  namespace: dc-api
spec:
  selector:
    app: dc-api-webhook
  ports:
    - name: https
      port: 443
      targetPort: 9443
