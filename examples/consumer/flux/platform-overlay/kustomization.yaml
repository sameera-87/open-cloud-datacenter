apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pull OCD's shared flux/platform/ as a remote base, plus the sealed
# secrets the init wizard generates alongside this file.
resources:
  # Pin to an OCD release tag — bump when upgrading.
  - https://github.com/wso2/open-cloud-datacenter//flux/platform?ref=v0.9.0
  # Sealed secrets generated by scripts/init-flux.sh seal.
  # Files live in THIS directory (alongside this kustomization.yaml) so
  # the root Flux Kustomization doesn't double-include them (it auto-scans
  # ../*.yaml; if they were there they'd be applied twice → conflict).
  # Commented out until `seal` has run and uncomments them.
  # - ./sealed-dc-postgres-secret.yaml
  # - ./sealed-dc-api-secrets.yaml
  # - ./sealed-dc-api-tls.yaml
  # - ./sealed-ghcr-pull-secret.yaml
  # - ./sealed-ghcr-pull-secret-flux-system.yaml
  #
  # keyvault-system ghcr-pull-secret is NOT here. KVI controller runs
  # on the Harvester cluster (TF-deployed), not on dcapi-controlplane.

# Per-env values patched into the shared base.
patches:
  - target: { kind: ConfigMap, name: dc-api-config }
    patch: |-
      - op: replace
        path: /data/DCAPI_OIDC_ISSUER
        value: "https://api.asgardeo.io/t/CHANGE-ME-asgardeo-org/oauth2/token"
      - op: replace
        path: /data/DCAPI_RANCHER_URL
        value: "https://CHANGE-ME-rancher-hostname"
      - op: replace
        path: /data/DCAPI_BFF_REDIRECT_URL
        value: "https://CHANGE-ME-dcapi-hostname/v1/auth/callback"
      - op: replace
        path: /data/DCAPI_BFF_POST_LOGIN_REDIRECT
        value: "https://CHANGE-ME-cloud-ui-hostname/"
      - op: replace
        path: /data/DCAPI_BFF_POST_LOGOUT_REDIRECT
        value: "https://CHANGE-ME-cloud-ui-hostname/"
      - op: replace
        path: /data/DCAPI_BFF_COOKIE_DOMAIN
        value: ".CHANGE-ME-parent-domain"
      - op: replace
        path: /data/DCAPI_VPC_EXTERNAL_BRIDGE
        value: "mgmt-br"
      - op: replace
        path: /data/DCAPI_VPC_EXTERNAL_CIDR
        value: "CHANGE-ME-cidr"
      - op: replace
        path: /data/DCAPI_VPC_EXTERNAL_GATEWAY
        value: "CHANGE-ME-gateway"

  # IdP directory (optional): uncomment to enable invite-by-email and the
  # member picker. dc-api FAILS FAST when DCAPI_IDP_* is half-configured —
  # only set these once `init-flux.sh seal` has also sealed
  # DCAPI_IDP_CLIENT_ID/SECRET (it auto-pulls them from the asgardeo-auth
  # layer's directory_client_id/_secret outputs when that env registers a
  # read-only directory M2M app).
  # - target: { kind: ConfigMap, name: dc-api-config }
  #   patch: |-
  #     - op: replace
  #       path: /data/DCAPI_IDP_SCIM_BASE_URL
  #       value: "https://api.asgardeo.io/t/CHANGE-ME-asgardeo-org/scim2"
  #     - op: replace
  #       path: /data/DCAPI_IDP_TOKEN_URL
  #       value: "https://api.asgardeo.io/t/CHANGE-ME-asgardeo-org/oauth2/token"
  #     - op: replace
  #       path: /data/DCAPI_IDP_SCOPES
  #       value: "internal_user_mgt_list internal_user_mgt_view internal_group_mgt_view"

  - target: { kind: Ingress, name: dc-api }
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: "CHANGE-ME-dcapi-hostname"
      - op: replace
        path: /spec/tls/0/hosts/0
        value: "CHANGE-ME-dcapi-hostname"

  # dc-agent connect endpoint. Use a sibling host under the same wildcard cert
  # as the API (e.g. connect.<domain>). This host must NOT sit behind a bot/JS
  # challenge — dc-agents are programmatic clients that can't solve one.
  - target: { kind: Ingress, name: dc-api-connect }
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: "CHANGE-ME-connect-hostname"
      - op: replace
        path: /spec/tls/0/hosts/0
        value: "CHANGE-ME-connect-hostname"

  - target: { kind: Ingress, name: cloud-ui }
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: "CHANGE-ME-cloud-ui-hostname"
      - op: replace
        path: /spec/tls/0/hosts/0
        value: "CHANGE-ME-cloud-ui-hostname"

  # Point each app's ImageRepository at THIS consumer's GHCR org so Flux
  # watches their own image streams, not WSO2's canonical.
  # (dc-webhook lives on Harvester via TF, not here.)
  - target: { kind: ImageRepository, name: dc-api }
    patch: |-
      - op: replace
        path: /spec/image
        value: "ghcr.io/CHANGE-ME-org/dc-api"
  - target: { kind: ImageRepository, name: cloud-ui }
    patch: |-
      - op: replace
        path: /spec/image
        value: "ghcr.io/CHANGE-ME-org/cloud-ui"
  # keyvault-operator ImageRepository patch removed — KVI is
  # TF-deployed on Harvester, not Flux-managed here.
  #
  # ARC dc-runner patch removed — the dc-runner is retired (its arc/base is
  # no longer in flux/platform/kustomization.yaml). Builds run on GitHub-
  # hosted runners and deploys are done by Flux, so there's nothing left
  # for an in-cluster self-hosted runner to do.

# Swap the placeholder ghcr.io/wso2/* images in the OCD base Deployments
# for this consumer's actual builds + pin an initial tag. The
# `{"$imagepolicy": "..."}` marker on each `newTag` tells Flux's Image
# Update Automation to bump just that field whenever the matching
# ImagePolicy resolves a newer tag.
images:
  - name: ghcr.io/wso2/dc-api
    newName: ghcr.io/CHANGE-ME-org/dc-api
    newTag: "CHANGE-ME-dc-api-tag" # {"$imagepolicy": "flux-system:dc-api:tag"}
  - name: ghcr.io/wso2/cloud-ui
    newName: ghcr.io/CHANGE-ME-org/cloud-ui
    newTag: "CHANGE-ME-cloud-ui-tag" # {"$imagepolicy": "flux-system:cloud-ui:tag"}
  # keyvault-operator image is set by the TF module that deploys KVI
  # to the Harvester cluster, not patched here.
