# Helm chart sources for the infrastructure controllers.
# Pinned versions live in each controller's HelmRelease.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: sealed-secrets
  namespace: flux-system
spec:
  interval: 1h
  # Chart repo moved from bitnami-labs.github.io (retired, now 404) to
  # bitnami.github.io/sealed-secrets. The old URL fails the index fetch and
  # blocks the infrastructure Kustomization's health check.
  url: https://bitnami.github.io/sealed-secrets
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jetstack
  namespace: flux-system
spec:
  interval: 1h
  url: https://charts.jetstack.io
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 1h
  url: https://kubernetes.github.io/ingress-nginx
