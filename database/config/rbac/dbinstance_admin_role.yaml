# This rule is not used by the project dbaas itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over dbaas.opencloud.wso2.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: dbaas
    app.kubernetes.io/managed-by: kustomize
    # Aggregate into the built-in K8s `admin` ClusterRole.
    # Rancher project-owner inherits `admin` on project namespaces,
    # so any group bound as project-owner picks up full DBInstance CRUD.
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
  name: dbinstance-admin-role
rules:
- apiGroups:
  - dbaas.opencloud.wso2.com
  resources:
  - dbinstances
  verbs:
  - '*'
- apiGroups:
  - dbaas.opencloud.wso2.com
  resources:
  - dbinstances/status
  verbs:
  - get
