# This rule is not used by the project dbaas itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the dbaas.opencloud.wso2.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: dbaas
    app.kubernetes.io/managed-by: kustomize
    # Aggregate into the built-in K8s `edit` ClusterRole.
    # Rancher project-member inherits `edit` on project namespaces,
    # so any group bound as project-member can create/modify/delete DBInstances
    # (but cannot manage RBAC).
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
  name: dbinstance-editor-role
rules:
- apiGroups:
  - dbaas.opencloud.wso2.com
  resources:
  - dbinstances
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - dbaas.opencloud.wso2.com
  resources:
  - dbinstances/status
  verbs:
  - get
