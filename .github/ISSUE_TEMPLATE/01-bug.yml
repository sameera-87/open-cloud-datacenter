name: "🐞 Report a Bug"
description: Something does not work as expected.
labels: ["Type/Bug"]
title: "[Bug]: "

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please search existing issues
        first to avoid duplicates, and do **not** include secrets, tokens, or
        kubeconfigs in logs you paste below.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the platform is affected?
      options:
        - Control Plane (dc-api)
        - Cloud UI
        - CLI (dcctl)
        - Terraform Modules
        - Operators
        - Docs
        - Other
      multiple: false
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the problem, including any error output or logs.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the steps you followed when you encountered the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen instead?
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How badly does this affect you?
      options:
        - Severity/Blocker
        - Severity/Critical
        - Severity/Major
        - Severity/Minor
        - Severity/Trivial
      multiple: false
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: The release tag, image tag, or git commit of the affected component(s).
      placeholder: "e.g. dc-api v0.4.2, cloud-ui @ a1b2c3d"
    validations:
      required: false
