worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /dev/stdout main;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml;

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Long cache for hashed static assets (Vite emits /assets/* with
        # content-hash filenames — safe to cache for 1 year).
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # No-cache for the SPA entry point so browsers always fetch the
        # latest index.html (which references the new hashed asset URLs).
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # SPA fallback: any path that isn't a real file or directory
        # resolves to index.html so React Router can handle it client-side.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # BFF reverse proxy: /v1/* goes straight to dc-api's ClusterIP
        # Service inside dc-system, bypassing the public ingress.
        # Cookie and Set-Cookie headers pass through unchanged so the
        # dcapi_session HttpOnly cookie works correctly.
        location /v1/ {
            proxy_pass http://dc-api.dc-system.svc.cluster.local/v1/;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass cookies unchanged in both directions.
            proxy_pass_header Set-Cookie;
            proxy_set_header Cookie $http_cookie;

            # Reasonable timeouts for async API calls (VM create takes
            # 2-5 minutes but the POST itself returns 202 immediately).
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # Disable buffering for SSE / streaming responses if we add
            # them later; harmless for regular JSON.
            proxy_buffering off;
        }

        # Health endpoint used by Kubernetes liveness/readiness probes.
        location = /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
            access_log off;
        }
    }
}
