# Ingress for the Cloud UI.
# Hostname: cloud.lk-dev.internal.wso2.com — add to /etc/hosts:
#   192.168.10.37  cloud.lk-dev.internal.wso2.com
# `.lk-dev.` is the dev-environment prefix; a future prod env will live at
# `cloud.lk.internal.wso2.com` (or a public URL).
#
# IMPORTANT: this manifest is also re-created by the wso2-datacenter-project
# TF module dc-controlplane-services (when cloudui_hostname is set). The CI
# workflow re-applies this file on every push, so if the two ever drift the
# CI apply will overwrite whatever TF set. Keep this in sync with the TF
# resource in modules/management/dc-controlplane-services/main.tf.
#
# TLS: dc-api-tls is the self-signed cert TF creates for the dc-api hostname
# with `*.lk-dev.internal.wso2.com` in the SAN list. That wildcard covers
# this hostname too, so we re-use the same Secret — one browser cert warning
# covers both UIs.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloud-ui
  namespace: dc-system
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - cloud.lk-dev.internal.wso2.com
      secretName: dc-api-tls
  rules:
    - host: cloud.lk-dev.internal.wso2.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloud-ui
                port:
                  number: 80
