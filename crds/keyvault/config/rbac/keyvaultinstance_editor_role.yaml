# This rule is not used by the project keyvault itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the keyvault.opencloud.wso2.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: keyvault
    app.kubernetes.io/managed-by: kustomize
  name: keyvaultinstance-editor-role
rules:
- apiGroups:
  - keyvault.opencloud.wso2.com
  resources:
  - keyvaultinstances
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - keyvault.opencloud.wso2.com
  resources:
  - keyvaultinstances/status
  verbs:
  - get
