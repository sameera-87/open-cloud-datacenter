# This rule is not used by the project keyvault itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to keyvault.opencloud.wso2.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: keyvault
    app.kubernetes.io/managed-by: kustomize
  name: keyvaultinstance-viewer-role
rules:
- apiGroups:
  - keyvault.opencloud.wso2.com
  resources:
  - keyvaultinstances
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - keyvault.opencloud.wso2.com
  resources:
  - keyvaultinstances/status
  verbs:
  - get
