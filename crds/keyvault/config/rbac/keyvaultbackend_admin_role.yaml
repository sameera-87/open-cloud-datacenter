# This rule is not used by the project keyvault itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over keyvault.opencloud.wso2.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: keyvault
    app.kubernetes.io/managed-by: kustomize
  name: keyvaultbackend-admin-role
rules:
- apiGroups:
  - keyvault.opencloud.wso2.com
  resources:
  - keyvaultbackends
  verbs:
  - '*'
- apiGroups:
  - keyvault.opencloud.wso2.com
  resources:
  - keyvaultbackends/status
  verbs:
  - get
