- apiGroups:
  - keyvault.opencloud.wso2.com
  resources:
  - keyvaultbackends/status
  - keyvaultinstances/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - rolebindings
  - roles
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
